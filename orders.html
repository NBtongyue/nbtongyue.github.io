<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单追踪 — 通跃检测内部系统</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"微软雅黑","Helvetica Neue",Arial,sans-serif; background:#f0f4fa; color:#333; min-height:100vh; }

    /* ── 顶部导航 ── */
    header {
      background:linear-gradient(135deg,#1b3a6b,#2563a8);
      color:#fff; padding:0 2rem; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }
    .h-left { display:flex; align-items:center; gap:1rem; }
    .h-logo { font-size:1rem; font-weight:700; letter-spacing:.02em; }
    .h-title {
      font-size:0.88rem; opacity:0.8;
      border-left:1px solid rgba(255,255,255,0.3); padding-left:1rem;
    }
    .h-right { display:flex; align-items:center; gap:1rem; font-size:0.88rem; }
    .h-user { opacity:0.85; }
    .btn-logout {
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35);
      color:#fff; padding:0.3rem 0.9rem; border-radius:5px;
      cursor:pointer; font-size:0.84rem; font-family:inherit; transition:background .2s;
    }
    .btn-logout:hover { background:rgba(255,255,255,0.28); }

    /* ── 主体 ── */
    main { padding:1.8rem 2rem; max-width:1600px; margin:0 auto; }

    /* ── 统计卡片 ── */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.4rem; }
    .stat-card {
      background:#fff; border-radius:10px; padding:1.2rem 1.5rem;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .num { font-size:2rem; font-weight:700; color:#1b3a6b; line-height:1; }
    .stat-card .lbl { font-size:0.83rem; color:#888; margin-top:0.35rem; }
    .stat-card.warn .num { color:#f59e0b; }

    /* ── 操作栏 ── */
    .controls {
      background:#fff; border-radius:10px; padding:1rem 1.2rem;
      margin-bottom:1rem; display:flex; gap:0.7rem; align-items:center;
      flex-wrap:wrap; box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .search-input {
      flex:1; min-width:200px; padding:0.55rem 0.9rem;
      border:1.5px solid #e0e7f0; border-radius:6px;
      font-size:0.9rem; font-family:inherit; outline:none; transition:border-color .2s;
    }
    .search-input:focus { border-color:#2563a8; }
    .ctrl-select {
      padding:0.55rem 0.8rem; border:1.5px solid #e0e7f0; border-radius:6px;
      font-size:0.9rem; font-family:inherit; background:#fff;
      cursor:pointer; outline:none; color:#333;
    }
    .ctrl-select:focus { border-color:#2563a8; }
    .btn-refresh {
      padding:0.55rem 1rem; background:#f0f4fa;
      border:1.5px solid #e0e7f0; border-radius:6px;
      font-size:0.88rem; cursor:pointer; font-family:inherit; transition:background .2s;
    }
    .btn-refresh:hover { background:#e0e7f0; }
    .btn-new {
      padding:0.55rem 1.2rem; background:#1b3a6b; color:#fff;
      border:none; border-radius:6px; font-size:0.88rem;
      cursor:pointer; font-family:inherit; font-weight:600;
      transition:background .2s; margin-left:auto;
    }
    .btn-new:hover { background:#2563a8; }

    /* ── 表格 ── */
    .table-wrap {
      background:#fff; border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow:hidden;
    }
    table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    thead { background:#f8faff; }
    th {
      padding:0.9rem 1rem; text-align:left;
      font-weight:600; color:#555;
      border-bottom:2px solid #e8eef8; white-space:nowrap;
    }
    td { padding:0.85rem 1rem; border-bottom:1px solid #f0f4f8; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#fafcff; }

    /* ── 状态徽章 ── */
    .badge { display:inline-block; padding:0.2rem 0.75rem; border-radius:12px; font-size:0.8rem; font-weight:600; white-space:nowrap; }
    .s-暂时合格   { background:#fef3c7; color:#d97706; }
    .s-正式合同   { background:#dbeafe; color:#1d4ed8; }
    .s-检测中     { background:#ede9fe; color:#7c3aed; }
    .s-证书申请中 { background:#d1fae5; color:#065f46; }
    .s-已完成     { background:#cffafe; color:#0e7490; }
    .s-已交付     { background:#dcfce7; color:#16a34a; }
    .s-已关闭     { background:#f1f5f9; color:#64748b; }
    .s-已作废     { background:#fee2e2; color:#991b1b; }

    /* ── 操作按钮 ── */
    .btn-act { padding:.22rem .55rem; border-radius:4px; font-size:.76rem; cursor:pointer; font-family:inherit; border:1px solid; transition:background .15s; white-space:nowrap; }
    .btn-act-next { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .btn-act-next:hover { background:#dbeafe; }
    .btn-act-void { background:#fffbeb; color:#b45309; border-color:#fde68a; }
    .btn-act-void:hover { background:#fef3c7; }
    .btn-act-del  { background:#fff5f5; color:#dc2626; border-color:#fecaca; }
    .btn-act-del:hover  { background:#fee2e2; }

    /* ── 认证类型标签 ── */
    .cert-tag {
      display:inline-block; padding:0.15rem 0.55rem; border-radius:4px;
      font-size:0.8rem; font-weight:700; background:#eef2ff; color:#3730a3;
    }

    /* ── 列宽调节手柄 ── */
    th { position:relative; }
    .resize-handle {
      position:absolute; right:0; top:0; height:100%; width:5px;
      cursor:col-resize; background:transparent; user-select:none; z-index:1;
    }
    .resize-handle:hover, .resize-handle.dragging { background:rgba(37,99,168,0.35); }

    /* ── 行内编辑 ── */
    .cell-input {
      width:100%; padding:.28rem .4rem; border:1.5px solid #c7d4e8;
      border-radius:4px; font-size:.82rem; font-family:inherit;
      outline:none; background:#fff; box-sizing:border-box; min-width:0;
    }
    .cell-input:focus { border-color:#2563a8; }
    .cell-input[type="number"] { text-align:right; }
    tr.editing-row td { background:#f0f6ff !important; padding:.35rem .5rem; }

    /* ── 金额单元格 ── */
    .amount-cell { color:#1b3a6b; font-weight:500; white-space:nowrap; }
    .profit-pos  { color:#065f46; font-weight:600; white-space:nowrap; }
    .profit-neg  { color:#dc2626; font-weight:600; white-space:nowrap; }

    /* ── 加载 / 空状态 ── */
    .state-msg { text-align:center; padding:4rem 1rem; color:#aaa; font-size:0.95rem; }
    .spinner {
      display:inline-block; width:22px; height:22px;
      border:3px solid #e0e7f0; border-top-color:#2563a8;
      border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:.5rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── 到期高亮 ── */
    .near-due { color:#d97706; font-weight:600; }
    .overdue  { color:#dc2626; font-weight:600; }

    /* ── 分页 ── */
    .pagination {
      display:none; justify-content:center; align-items:center;
      gap:0.4rem; padding:1.1rem;
      border-top:1px solid #f0f4f8;
    }
    .pg-btn {
      padding:0.38rem 0.75rem; border:1px solid #e0e7f0;
      border-radius:5px; background:#fff; cursor:pointer;
      font-size:0.84rem; font-family:inherit; transition:background .2s;
    }
    .pg-btn:hover:not(:disabled) { background:#f0f4fa; }
    .pg-btn:disabled { opacity:.4; cursor:not-allowed; }
    .pg-btn.active { background:#1b3a6b; color:#fff; border-color:#1b3a6b; }
    .pg-sep { color:#ccc; font-size:.84rem; }
    .pg-info { font-size:.83rem; color:#888; padding:0 .4rem; }

    /* ── 弹窗 ── */
    .modal-bg {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.45); z-index:200;
      align-items:center; justify-content:center; padding:1rem;
    }
    .modal-bg.open { display:flex; }
    .modal {
      background:#fff; border-radius:12px; padding:2rem;
      width:100%; max-width:560px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
      max-height:90vh; overflow-y:auto;
    }
    .modal h2 { font-size:1.1rem; color:#1b3a6b; margin-bottom:1.5rem; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
    .mfg { margin-bottom:1rem; }
    .mfg label { display:block; font-size:.85rem; color:#555; font-weight:500; margin-bottom:.35rem; }
    .mfg input, .mfg select, .mfg textarea {
      width:100%; padding:.65rem .85rem;
      border:1.5px solid #e0e7f0; border-radius:6px;
      font-size:.9rem; font-family:inherit; outline:none; transition:border-color .2s;
    }
    .mfg input:focus, .mfg select:focus, .mfg textarea:focus { border-color:#2563a8; }
    .mfg textarea { resize:vertical; min-height:70px; }
    .req { color:#dc2626; }
    .modal-btns { display:flex; gap:.8rem; justify-content:flex-end; margin-top:1.5rem; }
    .btn-cancel {
      padding:.65rem 1.3rem; background:#f0f4fa;
      border:1.5px solid #e0e7f0; border-radius:6px;
      cursor:pointer; font-family:inherit; font-size:.9rem;
    }
    .btn-save {
      padding:.65rem 1.5rem; background:#1b3a6b; color:#fff;
      border:none; border-radius:6px; cursor:pointer;
      font-family:inherit; font-size:.9rem; font-weight:600; transition:background .2s;
    }
    .btn-save:hover { background:#2563a8; }
    .btn-save:disabled { opacity:.6; cursor:not-allowed; }

    /* ── 响应式 ── */
    @media(max-width:900px) {
      main { padding:1.2rem 1rem; }
      .stats { grid-template-columns:repeat(2,1fr); }
      .h-title { display:none; }
    }
    @media(max-width:600px) {
      .form-row-3 { grid-template-columns:1fr; }
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6),
      th:nth-child(7), td:nth-child(7),
      th:nth-child(11), td:nth-child(11) { display:none; }
    }
  </style>
</head>
<body>

<script>
  if (!sessionStorage.getItem('ty_user')) location.replace('login.html');
</script>

<!-- 顶部导航 -->
<header>
  <div class="h-left">
    <div class="h-logo">通跃检测</div>
    <div class="h-title">认证订单追踪系统</div>
  </div>
  <div class="h-right">
    <span class="h-user" id="h-user"></span>
    <button class="btn-logout" onclick="logout()">退出登录</button>
  </div>
</header>

<main>
  <!-- 统计卡片 -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="s-total">—</div>
      <div class="lbl">全部订单</div>
    </div>
    <div class="stat-card">
      <div class="num" id="s-ongoing">—</div>
      <div class="lbl">进行中</div>
    </div>
    <div class="stat-card">
      <div class="num" id="s-done">—</div>
      <div class="lbl">已完成 / 已交付</div>
    </div>
    <div class="stat-card warn">
      <div class="num" id="s-due">—</div>
      <div class="lbl">7 天内到期</div>
    </div>
  </div>

  <!-- 操作栏 -->
  <div class="controls">
    <input class="search-input" id="search" type="text"
      placeholder="搜索订单编号、客户名称、项目名称…" oninput="applyFilters()">
    <select class="ctrl-select" id="f-status" onchange="applyFilters()">
      <option value="">全部状态</option>
      <option>暂时合格</option>
      <option>正式合同</option>
      <option>检测中</option>
      <option>证书申请中</option>
      <option>已完成</option>
      <option>已交付</option>
      <option>已关闭</option>
      <option>已作废</option>
    </select>
    <select class="ctrl-select" id="f-cert" onchange="applyFilters()">
      <option value="">全部认证</option>
    </select>
    <button class="btn-refresh" onclick="loadData()" title="从飞书重新拉取数据">↻ 刷新</button>
    <button class="btn-new" onclick="openModal()">＋ 新建订单</button>
  </div>

  <!-- 数据表格 -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>订单编号</th>
          <th>客户名称</th>
          <th>项目名称</th>
          <th>认证类型</th>
          <th>合同额</th>
          <th>信息费</th>
          <th>实验室额</th>
          <th>利润</th>
          <th>提交日期</th>
          <th>预计完成日期</th>
          <th>当前状态</th>
          <th>备注</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="13" class="state-msg"><span class="spinner"></span>加载中…</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<!-- 新建订单弹窗 -->
<div class="modal-bg" id="modal" onclick="onBgClick(event)">
  <div class="modal">
    <h2>新建订单</h2>
    <div class="form-row">
      <div class="mfg">
        <label>订单编号 <span class="req">*</span></label>
        <input id="m-no" type="text" readonly style="background:#f8faff;color:#1b3a6b;font-weight:600;cursor:default;">
      </div>
      <div class="mfg">
        <label>客户名称 <span class="req">*</span></label>
        <input id="m-client" type="text" placeholder="客户公司名称">
      </div>
    </div>
    <div class="mfg">
      <label>项目名称 <span class="req">*</span></label>
      <input id="m-proj" type="text" placeholder="产品或项目名称">
    </div>
    <div class="form-row">
      <div class="mfg">
        <label>认证类型</label>
        <select id="m-cert-sel" onchange="onCertSelChange()"></select>
        <input id="m-cert-new" type="text" placeholder="输入新认证类型，回车确认"
               style="display:none;margin-top:.5rem;"
               onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewCert();}">
      </div>
      <div class="mfg">
        <label>当前状态</label>
        <select id="m-status">
          <option>暂时合格</option>
          <option>正式合同</option>
          <option>检测中</option>
          <option>证书申请中</option>
          <option>已完成</option>
          <option>已交付</option>
        </select>
      </div>
    </div>
    <div class="form-row-3">
      <div class="mfg">
        <label>合同额（元）</label>
        <input id="m-contract" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="mfg">
        <label>信息费（元）</label>
        <input id="m-info-fee" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="mfg">
        <label>实验室额（元）</label>
        <input id="m-lab-fee" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="form-row">
      <div class="mfg">
        <label>提交日期</label>
        <input id="m-start" type="date">
      </div>
      <div class="mfg">
        <label>预计完成日期</label>
        <input id="m-end" type="date">
      </div>
    </div>
    <div class="mfg">
      <label>备注</label>
      <textarea id="m-note" placeholder="可选备注信息"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btn-save" onclick="saveOrder()">保存</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  代理配置
// ══════════════════════════════════════════════════════
const WORKER = 'https://nbtongyue-github-io.vercel.app';

// 飞书多维表格字段名（与表格列名保持一致）
const F = {
  no:       '订单编号',
  client:   '客户名称',
  proj:     '项目名称',
  cert:     '认证类型',
  contract: '合同额',
  infoFee:  '信息费',
  labFee:   '实验室额',
  start:    '提交日期',
  end:      '预计完成日期',
  status:   '当前状态',
  note:     '备注',
};

// 状态流转顺序
const STATUS_FLOW = ['暂时合格', '正式合同', '检测中', '证书申请中', '已完成', '已交付', '已关闭'];
const TERMINAL    = new Set(['已关闭', '已作废']);

// ── 认证类型管理（localStorage 持久化）──
const PRESET_CERTS   = ['KC', 'CE', 'FCC', 'RoHS', 'UL'];
const CERT_STORE_KEY = 'ty_cert_types';

function getCustomCerts() {
  try { return JSON.parse(localStorage.getItem(CERT_STORE_KEY) || '[]'); } catch { return []; }
}
function getAllCerts() {
  const custom = getCustomCerts();
  return [...PRESET_CERTS, ...custom.filter(c => !PRESET_CERTS.includes(c))];
}
function saveCustomCert(cert) {
  if (!cert || PRESET_CERTS.includes(cert)) return;
  const custom = getCustomCerts();
  if (!custom.includes(cert)) {
    custom.push(cert);
    localStorage.setItem(CERT_STORE_KEY, JSON.stringify(custom));
    refreshCertUI();
  }
}
function refreshCertUI(keepVal) {
  const all = getAllCerts();
  const mSel = document.getElementById('m-cert-sel');
  const mCur = keepVal !== undefined ? keepVal : mSel.value;
  mSel.innerHTML = '<option value="">请选择</option>' +
    all.map(c => `<option value="${c}"${c === mCur ? ' selected' : ''}>${c}</option>`).join('') +
    '<option value="__custom__">＋ 添加新类型…</option>';
  const fSel = document.getElementById('f-cert');
  const fCur = fSel.value;
  fSel.innerHTML = '<option value="">全部认证</option>' +
    all.map(c => `<option${c === fCur ? ' selected' : ''}>${c}</option>`).join('');
}

function onCertSelChange() {
  const inp = document.getElementById('m-cert-new');
  if (document.getElementById('m-cert-sel').value === '__custom__') {
    inp.style.display = 'block';
    inp.focus();
  } else {
    inp.style.display = 'none';
    inp.value = '';
  }
}

function confirmNewCert() {
  const inp = document.getElementById('m-cert-new');
  const val = inp.value.trim();
  if (!val) return;
  saveCustomCert(val);
  refreshCertUI(val);
  inp.style.display = 'none';
  inp.value = '';
}

// ══════════════════════════════════════════════════════
//  全局状态
// ══════════════════════════════════════════════════════
let allRecords  = [];
let filtered    = [];
const PAGE_SIZE = 20;
let currentPage = 1;
let editingId   = null;
let colWidths   = [];

// ══════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════
document.getElementById('h-user').textContent = '👤 ' + sessionStorage.getItem('ty_user');
document.getElementById('m-start').value = today();
refreshCertUI();
loadData();

// ══════════════════════════════════════════════════════
//  飞书 API（通过 Vercel 代理）
// ══════════════════════════════════════════════════════
async function fetchAllRecords() {
  let items = [], pageToken = '';
  do {
    const url = WORKER + '/records' + (pageToken ? '?page_token=' + pageToken : '');
    const res = await fetch(url);
    const d   = await res.json();
    if (d.code !== 0) throw new Error('读取数据失败：' + d.msg);
    items     = items.concat(d.data.items || []);
    pageToken = d.data.has_more ? d.data.page_token : '';
  } while (pageToken);
  return items;
}

async function createRecord(fields) {
  const res = await fetch(WORKER + '/records', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ fields }),
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('保存失败：' + d.msg);
}

async function updateRecord(recordId, fields) {
  const res = await fetch(WORKER + '/records', {
    method:  'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ record_id: recordId, fields }),
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('更新失败：' + d.msg);
}

async function deleteRecord(recordId) {
  const res = await fetch(WORKER + '/records?record_id=' + encodeURIComponent(recordId), {
    method: 'DELETE',
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('删除失败：' + d.msg);
}

// ══════════════════════════════════════════════════════
//  加载与渲染
// ══════════════════════════════════════════════════════
async function loadData() {
  showLoading();
  try {
    const items = await fetchAllRecords();
    allRecords  = items.map(item => {
      const f = item.fields;
      const endTs = fts(f[F.end]);
      return {
        id:       item.record_id,
        no:       fv(f[F.no]),
        client:   fv(f[F.client]),
        proj:     fv(f[F.proj]),
        cert:     fv(f[F.cert]),
        contract: fnv(f[F.contract]),
        infoFee:  fnv(f[F.infoFee]),
        labFee:   fnv(f[F.labFee]),
        start:    fd(f[F.start]),
        endTs,
        endFmt:   endTs ? fdTs(endTs) : '',
        status:   fv(f[F.status]),
        note:     fv(f[F.note]),
      };
    });
    allRecords.forEach(r => { if (r.cert) saveCustomCert(r.cert); });
    applyFilters();
    renderStats();
  } catch (err) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="13" class="state-msg" style="color:#dc2626">
        ⚠ ${err.message}<br>
        <small style="color:#aaa;margin-top:.5rem;display:block">
          请检查：飞书应用权限 → 多维表格读取权限是否已开启，且已将应用添加为表格协作者
        </small>
      </td></tr>`;
  }
}

function applyFilters() {
  const q      = document.getElementById('search').value.trim().toLowerCase();
  const status = document.getElementById('f-status').value;
  const cert   = document.getElementById('f-cert').value;

  filtered = allRecords.filter(r => {
    const matchQ = !q || [r.no, r.client, r.proj].some(v => v.toLowerCase().includes(q));
    const matchS = !status || r.status === status;
    const matchC = !cert   || r.cert   === cert;
    return matchQ && matchS && matchC;
  });
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const pgEl  = document.getElementById('pagination');
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const from  = (currentPage - 1) * PAGE_SIZE;
  const rows  = filtered.slice(from, from + PAGE_SIZE);

  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="13" class="state-msg">暂无订单数据</td></tr>';
    pgEl.style.display = 'none';
    return;
  }

  const now  = Date.now();
  const week = 7 * 24 * 3600 * 1000;
  tbody.innerHTML = rows.map(r => {
    const done    = TERMINAL.has(r.status) || ['已完成', '已交付', '已关闭'].includes(r.status);
    const nearDue = r.endTs && !done && r.endTs > now && r.endTs < now + week;
    const isOver  = r.endTs && !done && r.endTs < now;
    const dueCls  = isOver ? 'overdue' : nearDue ? 'near-due' : '';

    if (r.id === editingId) {
      const certOpts = ['', ...getAllCerts()].map(c =>
        `<option value="${escHtml(c)}"${c === r.cert ? ' selected' : ''}>${c || '请选择'}</option>`
      ).join('');
      const stOpts = [...STATUS_FLOW, '已作废'].map(s =>
        `<option${s === r.status ? ' selected' : ''}>${s}</option>`
      ).join('');
      return `<tr class="editing-row">
        <td><strong>${r.no || '—'}</strong></td>
        <td><input class="cell-input" id="ei-client" type="text" value="${escHtml(r.client)}"></td>
        <td><input class="cell-input" id="ei-proj"   type="text" value="${escHtml(r.proj)}"></td>
        <td><select class="cell-input" id="ei-cert">${certOpts}</select></td>
        <td><input class="cell-input" id="ei-contract" type="number" min="0" step="0.01" value="${r.contract ?? ''}"></td>
        <td><input class="cell-input" id="ei-info-fee" type="number" min="0" step="0.01" value="${r.infoFee  ?? ''}"></td>
        <td><input class="cell-input" id="ei-lab-fee"  type="number" min="0" step="0.01" value="${r.labFee   ?? ''}"></td>
        <td>${fmtProfit(r.contract, r.infoFee, r.labFee)}</td>
        <td><input class="cell-input" id="ei-start" type="date" value="${r.start}"></td>
        <td><input class="cell-input" id="ei-end"   type="date" value="${r.endFmt}"></td>
        <td><select class="cell-input" id="ei-status">${stOpts}</select></td>
        <td><input class="cell-input" id="ei-note" type="text" value="${escHtml(r.note)}"></td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <button class="btn-act btn-act-next" onclick="saveRowEdit('${r.id}')">保存</button>
            <button class="btn-act" style="background:#f0f4fa;border-color:#e0e7f0;color:#555;" onclick="cancelRowEdit()">取消</button>
            <button class="btn-act btn-act-del"  onclick="deleteOrder('${r.id}','${r.no}')">删除</button>
          </div>
        </td>
      </tr>`;
    }

    const noteText = r.note ? r.note.replace(/"/g, '&quot;') : '';
    return `<tr>
      <td><strong>${r.no     || '—'}</strong></td>
      <td>${r.client  || '—'}</td>
      <td>${r.proj    || '—'}</td>
      <td>${r.cert ? `<span class="cert-tag">${r.cert}</span>` : '—'}</td>
      <td class="amount-cell">${fmtAmount(r.contract)}</td>
      <td class="amount-cell">${fmtAmount(r.infoFee)}</td>
      <td class="amount-cell">${fmtAmount(r.labFee)}</td>
      <td>${fmtProfit(r.contract, r.infoFee, r.labFee)}</td>
      <td>${r.start   || '—'}</td>
      <td class="${dueCls}">${r.endFmt || '—'}${nearDue ? ' ⚠' : ''}${isOver ? ' 已超期' : ''}</td>
      <td>${r.status ? `<span class="badge s-${r.status}">${r.status}</span>` : '—'}</td>
      <td style="color:#888;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${noteText}">${r.note || '—'}</td>
      <td>
        <button class="btn-act btn-act-next" onclick="editRow('${r.id}')">编辑</button>
      </td>
    </tr>`;
  }).join('');
  initResizableColumns();

  if (pages <= 1) { pgEl.style.display = 'none'; return; }
  pgEl.style.display = 'flex';
  let html = `<button class="pg-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ 上一页</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 8 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== pages) {
      if (i === currentPage - 3 || i === currentPage + 3) html += '<span class="pg-sep">…</span>';
      continue;
    }
    html += `<button class="pg-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>下一页 ›</button>`;
  html += `<span class="pg-info">共 ${total} 条</span>`;
  pgEl.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderStats() {
  const now  = Date.now();
  const week = 7 * 24 * 3600 * 1000;
  const ongoing = ['待提交', '资料审核', '检测中', '证书申请中'];
  document.getElementById('s-total').textContent   = allRecords.length;
  document.getElementById('s-ongoing').textContent = allRecords.filter(r => ongoing.includes(r.status)).length;
  document.getElementById('s-done').textContent    = allRecords.filter(r => ['已完成', '已交付', '已关闭'].includes(r.status)).length;
  document.getElementById('s-due').textContent     = allRecords.filter(r =>
    r.endTs && r.endTs > now && r.endTs < now + week && !TERMINAL.has(r.status) && !['已完成', '已交付', '已关闭'].includes(r.status)
  ).length;
}

function showLoading() {
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="13" class="state-msg"><span class="spinner"></span>加载中…</td></tr>';
  document.getElementById('pagination').style.display = 'none';
}

// ══════════════════════════════════════════════════════
//  字段值解析辅助函数
// ══════════════════════════════════════════════════════
function fv(val) {
  if (val == null) return '';
  if (typeof val === 'string') return val;
  if (typeof val === 'number') return String(val);
  if (Array.isArray(val)) return val.map(v => typeof v === 'string' ? v : (v.text || v.value || '')).join('');
  if (typeof val === 'object') return val.value || val.text || '';
  return String(val);
}
function fnv(val) {
  if (val == null) return null;
  if (typeof val === 'number') return val;
  if (typeof val === 'object' && val.value != null) return Number(val.value);
  const n = parseFloat(val);
  return isNaN(n) ? null : n;
}
function fmtAmount(val) {
  if (val == null) return '—';
  return '¥' + val.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtProfit(contract, infoFee, labFee) {
  if (contract == null && infoFee == null && labFee == null) return '—';
  const profit = (contract || 0) - (infoFee || 0) - (labFee || 0);
  const cls    = profit >= 0 ? 'profit-pos' : 'profit-neg';
  return `<span class="${cls}">¥${profit.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>`;
}
function fts(val) {
  if (!val) return null;
  if (typeof val === 'number') return val;
  if (typeof val === 'object' && val.value) return Number(val.value);
  return null;
}
function fdTs(ts) {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function fd(val) { return val ? fdTs(fts(val) || 0) : ''; }
function pad(n)  { return String(n).padStart(2, '0'); }
function today() { return new Date().toISOString().slice(0, 10); }

// ══════════════════════════════════════════════════════
//  弹窗操作
// ══════════════════════════════════════════════════════
function generateOrderNo() {
  const user   = sessionStorage.getItem('ty_user') || '';
  const suffix = user === 'mindy' ? 'F' : 'L';
  const now = new Date();
  const y = now.getFullYear();
  const m = pad(now.getMonth() + 1);
  const d = pad(now.getDate());

  const regex = /^NBTY\d{8}[LF](\d{4})$/;
  let maxSeq = 20;
  allRecords.forEach(r => {
    const match = (r.no || '').match(regex);
    if (match) {
      const seq = parseInt(match[1], 10);
      if (seq > maxSeq) maxSeq = seq;
    }
  });

  return `NBTY${y}${m}${d}${suffix}${String(maxSeq + 1).padStart(4, '0')}`;
}

function openModal() {
  document.getElementById('m-no').value = generateOrderNo();
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['m-no', 'm-client', 'm-proj', 'm-note', 'm-contract', 'm-info-fee', 'm-lab-fee'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('m-cert-sel').value = '';
  document.getElementById('m-cert-new').style.display = 'none';
  document.getElementById('m-cert-new').value = '';
  document.getElementById('m-status').value = '暂时合格';
  document.getElementById('m-end').value    = '';
  document.getElementById('m-start').value  = today();
  document.getElementById('btn-save').disabled    = false;
  document.getElementById('btn-save').textContent = '保存';
}
function onBgClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

async function saveOrder() {
  const no     = document.getElementById('m-no').value.trim();
  const client = document.getElementById('m-client').value.trim();
  const proj   = document.getElementById('m-proj').value.trim();
  if (!client || !proj) {
    alert('请填写客户名称和项目名称');
    return;
  }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    const fields = {
      [F.no]:     no,
      [F.client]: client,
      [F.proj]:   proj,
      [F.status]: document.getElementById('m-status').value,
    };
    const certSel = document.getElementById('m-cert-sel').value;
    const certNew = document.getElementById('m-cert-new').value.trim();
    const cert    = certSel === '__custom__' ? certNew : certSel;
    if (cert) { fields[F.cert] = cert; saveCustomCert(cert); }

    const contract = parseFloat(document.getElementById('m-contract').value);
    if (!isNaN(contract)) fields[F.contract] = contract;
    const infoFee = parseFloat(document.getElementById('m-info-fee').value);
    if (!isNaN(infoFee)) fields[F.infoFee] = infoFee;
    const labFee = parseFloat(document.getElementById('m-lab-fee').value);
    if (!isNaN(labFee)) fields[F.labFee] = labFee;

    const start = document.getElementById('m-start').value;
    if (start) fields[F.start] = new Date(start + 'T00:00:00').getTime();
    const end = document.getElementById('m-end').value;
    if (end) fields[F.end] = new Date(end + 'T00:00:00').getTime();
    const note = document.getElementById('m-note').value.trim();
    if (note) fields[F.note] = note;

    await createRecord(fields);
    closeModal();
    await loadData();
  } catch (err) {
    alert(err.message);
    btn.disabled = false; btn.textContent = '保存';
  }
}

// ══════════════════════════════════════════════════════
//  行内编辑
// ══════════════════════════════════════════════════════
function editRow(id) {
  editingId = id;
  renderTable();
}
function cancelRowEdit() {
  editingId = null;
  renderTable();
}

async function saveRowEdit(recordId) {
  const client = document.getElementById('ei-client').value.trim();
  const proj   = document.getElementById('ei-proj').value.trim();
  if (!client || !proj) { alert('客户名称和项目名称不能为空'); return; }
  try {
    const fields = {
      [F.client]: client,
      [F.proj]:   proj,
      [F.status]: document.getElementById('ei-status').value,
    };
    const cert = document.getElementById('ei-cert').value;
    if (cert) { fields[F.cert] = cert; saveCustomCert(cert); }

    const contract = parseFloat(document.getElementById('ei-contract').value);
    if (!isNaN(contract)) fields[F.contract] = contract;
    const infoFee = parseFloat(document.getElementById('ei-info-fee').value);
    if (!isNaN(infoFee)) fields[F.infoFee] = infoFee;
    const labFee = parseFloat(document.getElementById('ei-lab-fee').value);
    if (!isNaN(labFee)) fields[F.labFee] = labFee;

    const start = document.getElementById('ei-start').value;
    if (start) fields[F.start] = new Date(start + 'T00:00:00').getTime();
    const end = document.getElementById('ei-end').value;
    if (end) fields[F.end] = new Date(end + 'T00:00:00').getTime();
    fields[F.note] = document.getElementById('ei-note').value.trim();

    await updateRecord(recordId, fields);
    editingId = null;
    await loadData();
  } catch (err) { alert(err.message); }
}

// ══════════════════════════════════════════════════════
//  删除
// ══════════════════════════════════════════════════════
async function deleteOrder(recordId, orderNo) {
  if (!confirm(`确认永久删除订单 ${orderNo}？删除后无法恢复。`)) return;
  try {
    await deleteRecord(recordId);
    editingId = null;
    await loadData();
  } catch (err) { alert(err.message); }
}

// ══════════════════════════════════════════════════════
//  可调节列宽
// ══════════════════════════════════════════════════════
function initResizableColumns() {
  const table = document.querySelector('table');
  if (!table) return;
  const ths = Array.from(table.querySelectorAll('thead th'));

  if (colWidths.length === ths.length) {
    ths.forEach((th, i) => { th.style.width = colWidths[i]; });
  } else {
    ths.forEach(th => { th.style.width = th.offsetWidth + 'px'; });
    colWidths = ths.map(th => th.style.width);
  }
  table.style.tableLayout = 'fixed';

  ths.forEach((th, i) => {
    if (th.querySelector('.resize-handle')) return;
    const h = document.createElement('div');
    h.className = 'resize-handle';
    th.appendChild(h);
    let x0, w0;
    h.addEventListener('mousedown', e => {
      x0 = e.pageX; w0 = th.offsetWidth;
      h.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      const onMove = e => {
        const w = Math.max(40, w0 + e.pageX - x0);
        th.style.width = w + 'px';
        colWidths[i] = w + 'px';
      };
      const onUp = () => {
        h.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    });
  });
}

// ══════════════════════════════════════════════════════
//  退出登录
// ══════════════════════════════════════════════════════
function logout() {
  sessionStorage.clear();
  location.href = 'login.html';
}
