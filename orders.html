<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 — 通跃检测内部系统</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"微软雅黑","Helvetica Neue",Arial,sans-serif; background:#f0f4fa; color:#333; min-height:100vh; }

    /* ── 顶部导航 ── */
    header {
      background:linear-gradient(135deg,#1b3a6b,#2563a8);
      color:#fff; padding:0 1.5rem; height:46px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }
    .h-left { display:flex; align-items:center; gap:0.7rem; }
    .h-logo { font-size:0.92rem; font-weight:700; letter-spacing:.02em; }
    .h-title {
      font-size:0.8rem; opacity:0.8;
      border-left:1px solid rgba(255,255,255,0.3); padding-left:0.7rem;
    }
    .h-right { display:flex; align-items:center; gap:0.7rem; font-size:0.8rem; }
    .h-user { opacity:0.85; }
    .btn-logout {
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35);
      color:#fff; padding:0.2rem 0.6rem; border-radius:5px;
      cursor:pointer; font-size:0.76rem; font-family:inherit; transition:background .2s;
    }
    .btn-logout:hover { background:rgba(255,255,255,0.28); }

    /* ── Tab 导航 ── */
    .tab-nav {
      background:#fff; border-bottom:2px solid #e8eef8;
      padding:0 1.5rem; display:flex; position:sticky; top:46px; z-index:99;
      box-shadow:0 1px 4px rgba(0,0,0,0.05);
    }
    .tab-btn {
      padding:.55rem 1.1rem; border:none; background:transparent;
      font-size:.82rem; font-family:inherit; cursor:pointer; color:#666;
      font-weight:500; border-bottom:3px solid transparent;
      margin-bottom:-2px; transition:all .2s;
    }
    .tab-btn:hover { color:#2563a8; }
    .tab-btn.active { color:#1b3a6b; border-bottom-color:#1b3a6b; font-weight:700; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── 主体 ── */
    main { padding:1rem 1.5rem; max-width:1600px; margin:0 auto; }

    /* ── 统计卡片 ── */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:0.7rem; margin-bottom:0.8rem; }
    .stats-finance { display:grid; grid-template-columns:repeat(4,1fr); gap:0.7rem; margin-bottom:0.8rem; }
    .stat-card {
      background:#fff; border-radius:8px; padding:0.7rem 1rem;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .num { font-size:1.5rem; font-weight:700; color:#1b3a6b; line-height:1; }
    .stat-card .lbl { font-size:0.76rem; color:#888; margin-top:0.2rem; }
    .stat-card.warn .num { color:#f59e0b; }

    /* ── 操作栏 ── */
    .controls {
      background:#fff; border-radius:8px; padding:0.5rem 0.8rem;
      margin-bottom:0.6rem; display:flex; gap:0.5rem; align-items:center;
      flex-wrap:wrap; box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .search-input {
      flex:1; min-width:180px; padding:0.4rem 0.6rem;
      border:1.5px solid #e0e7f0; border-radius:5px;
      font-size:0.82rem; font-family:inherit; outline:none; transition:border-color .2s;
    }
    .search-input:focus { border-color:#2563a8; }
    .ctrl-select {
      padding:0.4rem 0.6rem; border:1.5px solid #e0e7f0; border-radius:5px;
      font-size:0.82rem; font-family:inherit; background:#fff;
      cursor:pointer; outline:none; color:#333;
    }
    .ctrl-select:focus { border-color:#2563a8; }
    .btn-refresh {
      padding:0.4rem 0.7rem; background:#f0f4fa;
      border:1.5px solid #e0e7f0; border-radius:5px;
      font-size:0.8rem; cursor:pointer; font-family:inherit; transition:background .2s;
    }
    .btn-refresh:hover { background:#e0e7f0; }
    .btn-new {
      padding:0.4rem 0.9rem; background:#1b3a6b; color:#fff;
      border:none; border-radius:5px; font-size:0.8rem;
      cursor:pointer; font-family:inherit; font-weight:600;
      transition:background .2s; margin-left:auto;
    }
    .btn-new:hover { background:#2563a8; }

    /* ── 综合筛选栏 ── */
    .filter-bar {
      background:#fff; border-radius:8px; padding:0.6rem 0.8rem;
      margin-bottom:0.6rem; display:flex; gap:0.5rem; align-items:flex-end;
      flex-wrap:wrap; box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .filter-group {
      display:flex; flex-direction:column; gap:0.2rem; min-width:110px;
    }
    .filter-group.wide { min-width:180px; }
    .filter-label {
      font-size:0.72rem; color:#888; font-weight:500; white-space:nowrap;
    }
    .filter-range {
      display:flex; align-items:center; gap:0.25rem;
    }
    .filter-range .filter-input { flex:1; min-width:70px; }
    .filter-range span { color:#aaa; font-size:0.78rem; flex-shrink:0; }
    .filter-input {
      padding:0.38rem 0.5rem; border:1.5px solid #e0e7f0; border-radius:5px;
      font-size:0.8rem; font-family:inherit; outline:none; background:#fff;
      transition:border-color .2s; color:#333;
    }
    .filter-input:focus { border-color:#2563a8; }
    .filter-input[type="number"] { width:85px; }
    .filter-input[type="date"] { width:120px; }
    .filter-select {
      padding:0.38rem 0.5rem; border:1.5px solid #e0e7f0; border-radius:5px;
      font-size:0.8rem; font-family:inherit; background:#fff; cursor:pointer;
      outline:none; color:#333; min-width:90px; transition:border-color .2s;
    }
    .filter-select:focus { border-color:#2563a8; }
    .filter-search {
      flex:1.5; min-width:160px;
    }
    .filter-search .filter-input { width:100%; }
    .filter-reset {
      padding:0.38rem 0.6rem; background:#f0f4fa; border:1.5px solid #e0e7f0;
      border-radius:5px; font-size:0.78rem; cursor:pointer; font-family:inherit;
      color:#888; white-space:nowrap; transition:background .2s; align-self:flex-end;
    }
    .filter-reset:hover { background:#e0e7f0; color:#555; }

    /* ── 表格 ── */
    .table-wrap {
      background:#fff; border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow-x:auto;
      -webkit-overflow-scrolling:touch;
    }
    table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    thead { background:#f8faff; }
    th {
      padding:0.45rem 0.55rem; text-align:left;
      font-weight:600; color:#555; font-size:0.78rem;
      border-bottom:2px solid #e8eef8; white-space:nowrap; position:relative;
    }
    td { padding:0.35rem 0.55rem; border-bottom:1px solid #f0f4f8; word-break:break-all; overflow-wrap:break-word; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#fafcff; }

    /* ── 状态徽章 ── */
    .badge { display:inline-block; padding:0.15rem 0.55rem; border-radius:12px; font-size:0.74rem; font-weight:600; }
    .s-暂时合同   { background:#fef3c7; color:#d97706; }
    .s-正式合同   { background:#dbeafe; color:#1d4ed8; }
    .s-检测中     { background:#ede9fe; color:#7c3aed; }
    .s-证书申请中 { background:#d1fae5; color:#065f46; }
    .s-已完成     { background:#cffafe; color:#0e7490; }
    .s-已交付     { background:#dcfce7; color:#16a34a; }
    .s-已关闭     { background:#f1f5f9; color:#64748b; }
    .s-已作废     { background:#fee2e2; color:#991b1b; }
    .s-已结清     { background:#dcfce7; color:#16a34a; }
    .s-部分付款   { background:#fef3c7; color:#d97706; }
    .s-未付款     { background:#fee2e2; color:#991b1b; }

    /* ── 操作按钮 ── */
    .btn-act { padding:.22rem .55rem; border-radius:4px; font-size:.76rem; cursor:pointer; font-family:inherit; border:1px solid; transition:background .15s; white-space:nowrap; }
    .btn-act-next { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .btn-act-next:hover { background:#dbeafe; }
    .btn-act-del  { background:#fff5f5; color:#dc2626; border-color:#fecaca; }
    .btn-act-del:hover  { background:#fee2e2; }

    /* ── 类型标签 ── */
    .cert-tag {
      display:inline-block; padding:0.1rem 0.4rem; border-radius:3px;
      font-size:0.74rem; font-weight:700; background:#eef2ff; color:#3730a3;
    }

    /* ── 列宽调节手柄 ── */
    .resize-handle {
      position:absolute; right:0; top:0; height:100%; width:5px;
      cursor:col-resize; background:transparent; user-select:none; z-index:1;
    }
    .resize-handle:hover, .resize-handle.dragging { background:rgba(37,99,168,0.35); }

    /* ── 行内编辑 ── */
    .cell-input {
      width:100%; padding:.2rem .3rem; border:1.5px solid #c7d4e8;
      border-radius:3px; font-size:.76rem; font-family:inherit;
      outline:none; background:#fff; box-sizing:border-box; min-width:0;
    }
    .cell-input:focus { border-color:#2563a8; }
    .cell-input[type="number"] { text-align:right; }
    tr.editing-row td { background:#f0f6ff !important; padding:.25rem .4rem; }

    /* ── 金额单元格 ── */
    .amount-cell { color:#1b3a6b; font-weight:500; }
    .profit-pos  { color:#065f46; font-weight:600; white-space:nowrap; }
    .profit-neg  { color:#dc2626; font-weight:600; white-space:nowrap; }

    /* ── 加载 / 空状态 ── */
    .state-msg { text-align:center; padding:2.5rem 1rem; color:#aaa; font-size:0.88rem; }
    .spinner {
      display:inline-block; width:22px; height:22px;
      border:3px solid #e0e7f0; border-top-color:#2563a8;
      border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:.5rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── 到期高亮 ── */
    .near-due { color:#d97706; font-weight:600; }
    .overdue  { color:#dc2626; font-weight:600; }

    /* ── 分页 ── */
    .pagination {
      display:none; justify-content:center; align-items:center;
      gap:0.3rem; padding:0.6rem; border-top:1px solid #f0f4f8;
    }
    .pg-btn {
      padding:0.28rem 0.55rem; border:1px solid #e0e7f0;
      border-radius:4px; background:#fff; cursor:pointer;
      font-size:0.78rem; font-family:inherit; transition:background .2s;
    }
    .pg-btn:hover:not(:disabled) { background:#f0f4fa; }
    .pg-btn:disabled { opacity:.4; cursor:not-allowed; }
    .pg-btn.active { background:#1b3a6b; color:#fff; border-color:#1b3a6b; }
    .pg-sep { color:#ccc; font-size:.78rem; }
    .pg-info { font-size:.76rem; color:#888; padding:0 .4rem; }

    /* ── 弹窗 ── */
    .modal-bg {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.45); z-index:200;
      align-items:center; justify-content:center; padding:1rem;
    }
    .modal-bg.open { display:flex; }
    .modal {
      background:#fff; border-radius:12px; padding:2rem;
      width:100%; max-width:560px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
      max-height:90vh; overflow-y:auto;
    }
    .modal h2 { font-size:1.1rem; color:#1b3a6b; margin-bottom:1.5rem; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
    .mfg { margin-bottom:1rem; }
    .mfg label { display:block; font-size:.85rem; color:#555; font-weight:500; margin-bottom:.35rem; }
    .mfg input, .mfg select, .mfg textarea {
      width:100%; padding:.65rem .85rem;
      border:1.5px solid #e0e7f0; border-radius:6px;
      font-size:.9rem; font-family:inherit; outline:none; transition:border-color .2s;
    }
    .mfg input:focus, .mfg select:focus, .mfg textarea:focus { border-color:#2563a8; }
    .mfg textarea { resize:vertical; min-height:70px; }
    .req { color:#dc2626; }
    .modal-btns { display:flex; gap:.8rem; justify-content:flex-end; margin-top:1.5rem; }
    .btn-cancel {
      padding:.65rem 1.3rem; background:#f0f4fa;
      border:1.5px solid #e0e7f0; border-radius:6px;
      cursor:pointer; font-family:inherit; font-size:.9rem;
    }
    .btn-save {
      padding:.65rem 1.5rem; background:#1b3a6b; color:#fff;
      border:none; border-radius:6px; cursor:pointer;
      font-family:inherit; font-size:.9rem; font-weight:600; transition:background .2s;
    }
    .btn-save:hover { background:#2563a8; }
    .btn-save:disabled { opacity:.6; cursor:not-allowed; }

    /* ── 付款展开面板 ── */
    .pay-detail-row td { padding:0; border-bottom:1px solid #e8eef8; background:#fafbfd; }
    .pay-detail-card {
      display:flex; gap:1.5rem; padding:0.6rem 1rem; flex-wrap:wrap;
    }
    .pay-group { flex:1; min-width:260px; }
    .pay-group-title {
      font-size:0.76rem; font-weight:700; color:#1b3a6b;
      margin-bottom:0.35rem; padding-bottom:0.25rem; border-bottom:1px dashed #d0d8e8;
    }
    .pay-items { display:flex; gap:0.8rem; flex-wrap:wrap; align-items:center; }
    .pay-item { font-size:0.76rem; color:#666; white-space:nowrap; }
    .pay-item strong { color:#333; }
    .pay-item.pay-total { font-weight:600; }
    .pay-item.pay-remain strong { color:#dc2626; }
    .pay-item.pay-done strong { color:#16a34a; }
    .exp-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; border-radius:3px; border:1px solid #d0d8e8;
      background:#f8faff; cursor:pointer; font-size:0.7rem; color:#888;
      transition:all .15s; line-height:1; padding:0;
    }
    .exp-btn:hover { background:#e0e8f8; color:#1b3a6b; border-color:#2563a8; }
    .exp-btn.open { background:#1b3a6b; color:#fff; border-color:#1b3a6b; }

    /* ── 响应式 ── */
    @media(max-width:900px) {
      main { padding:0.8rem 0.8rem; }
      .stats { grid-template-columns:repeat(2,1fr); }
      .h-title { display:none; }
      .tab-nav { padding:0 0.8rem; }
      .filter-group { min-width:90px; }
      .filter-group.wide { min-width:130px; }
      .filter-input[type="date"] { width:105px; }
    }
    @media(max-width:600px) {
      .form-row-3 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<script>
  if (!sessionStorage.getItem('ty_token')) location.replace('login.html');
</script>

<header>
  <div class="h-left">
    <div class="h-logo">通跃检测</div>
    <div class="h-title" id="h-tab-title">认证订单追踪系统</div>
  </div>
  <div class="h-right">
    <button id="btn-refresh-all" class="btn-logout" onclick="refreshAll()" title="从飞书重新拉取全部数据">↻ 刷新数据</button>
    <span class="h-user" id="h-user"></span>
    <button class="btn-logout" onclick="logout()">退出登录</button>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" id="tab-btn-cert" onclick="switchTab('cert')">认证订单追踪</button>
  <button class="tab-btn"        id="tab-btn-lab"  onclick="switchTab('lab')">实验室分包订单</button>
  <button class="tab-btn"        id="tab-btn-finance" onclick="switchTab('finance')">财务统计</button>
  <button class="tab-btn"        id="tab-btn-ledger" onclick="switchTab('ledger')">账本统计</button>
  <button class="tab-btn"        id="tab-btn-void" onclick="switchTab('void')">已作废</button>
</nav>

<div id="panel-cert" class="tab-panel active"></div>
<div id="panel-lab"  class="tab-panel"></div>
<div id="panel-finance" class="tab-panel"></div>
<div id="panel-ledger" class="tab-panel"></div>
<div id="panel-void" class="tab-panel"></div>
<div id="debug-info" style="display:block;position:fixed;bottom:0;right:0;background:#ffeb3b;color:#333;padding:4px 8px;font-size:11px;z-index:9999;font-family:monospace;max-width:400px;word-break:break-all;"></div>

<script>
function debug(msg) {
  var el = document.getElementById('debug-info');
  if (el) el.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  console.log('DEBUG:', msg);
}

// ════════════════════════════════════════════════════════════
//  系统配置
// ════════════════════════════════════════════════════════════
const WORKER = '';

const STATUS_FLOW = ['暂时合同','正式合同','检测中','证书申请中','已交付'];
const TERMINAL    = new Set(['已作废']);
const PAGE_SIZE   = 20;
var FIN_COL_WIDTHS = [];

const SYSTEMS = {
  cert: {
    key:          'cert',
    name:         '认证订单追踪系统',
    apiUrl:       '/api/records',
    F: {
      no:'订单编号', client:'客户名称', proj:'项目名称', tag:'认证类型',
      contract:'合同额', infoFee:'信息费', labFee:'实验室额',
      start:'提交日期', end:'预计完成日期', status:'当前状态', note:'备注',
      clientPay1:'客户首付款', clientPay2:'客户二次付款', clientPay3:'客户尾款',
      labPay1:'实验室首付款', labPay2:'实验室二次付款', labPay3:'实验室尾款',
      clientInvoice:'客户发票额', labInvoice:'实验室发票', infoFeeInvoice:'信息费发票',
    },
    clientLabel:  '客户名称',
    tagLabel:     '认证类型',
    presetTags:   ['KC','CE','FCC','RoHS','UL'],
    storageKey:   'ty_cert_types',
    orderPfx:     'NBTY',
    colCount:     14,
    selectOrderNo: false,
    noTag:        false,
    noInfoFee:    false,
    noLabFee:     false,
    noProfit:     false,
    records: [], filtered: [], page: 1, editingId: null, colWidths: [],
  },
  lab: {
    key:          'lab',
    name:         '实验室分包订单系统',
    apiUrl:       '/api/lab-records',
    F: {
      no:'订单编号', client:'实验室名称', proj:'项目名称',
      contract:'合同额',
      start:'提交日期', end:'预计完成日期', status:'当前状态', note:'备注',
    },
    clientLabel:  '实验室名称',
    colCount:     9,
    selectOrderNo: true,
    noTag:        true,
    noInfoFee:    true,
    noLabFee:     true,
    noProfit:     true,
    records: [], filtered: [], page: 1, editingId: null, colWidths: [],
  },
};

// ════════════════════════════════════════════════════════════
//  面板 HTML 构建（按系统差异生成不同结构）
// ════════════════════════════════════════════════════════════
function buildPanel(sys) {
  const k  = sys.key;
  const cc = sys.colCount;

  // 表头
  let thead = `<th style="width:28px;"></th><th>订单编号</th><th>${sys.clientLabel}</th><th>项目名称</th>`;
  if (!sys.noTag)     thead += `<th>${sys.tagLabel}</th>`;
  thead += '<th>合同额</th>';
	  if (!sys.noInfoFee) thead += '<th>信息费</th>';
	  if (!sys.noLabFee)  thead += '<th>实验室额</th>';
	  if (!sys.noProfit)  thead += '<th>利润</th>';
  thead += '<th>提交日期</th><th>预计完成日期</th><th>当前状态</th><th>备注</th><th>操作</th>';

  // 弹窗订单编号字段
  const noField = sys.selectOrderNo
    ? `<select id="${k}-m-no" onchange="onLabOrderSelect()" style="color:#1b3a6b;font-weight:600;">
         <option value="">— 请选择认证订单编号 —</option>
       </select>`
    : `<input id="${k}-m-no" type="text" readonly style="background:#f8faff;color:#1b3a6b;font-weight:600;cursor:default;">`;

  // 弹窗类型选择行
  const tagRow = sys.noTag ? '' : `
    <div class="form-row">
      <div class="mfg">
        <label>${sys.tagLabel}</label>
        <select id="${k}-m-tag-sel" onchange="onTagSelChange('${k}')"></select>
        <input id="${k}-m-tag-new" type="text" placeholder="输入新${sys.tagLabel}，回车确认"
               style="display:none;margin-top:.5rem;"
               onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewTag('${k}');}">
      </div>
      <div class="mfg">
        <label>当前状态</label>
        <select id="${k}-m-status">
          ${STATUS_FLOW.map(s => `<option>${s}</option>`).join('')}
        </select>
      </div>
    </div>`;

  // 弹窗金额字段
  const amountFields = sys.noInfoFee
    ? `<div class="form-row">

// ════════════════════════════════════════════════════════════
function getCustomTags(sys) {
  try { return JSON.parse(localStorage.getItem(sys.storageKey) || '[]'); } catch { return []; }
}
function getAllTags(sys) {
  const custom = getCustomTags(sys);
  return [...sys.presetTags, ...custom.filter(c => !sys.presetTags.includes(c))];
}
function saveCustomTag(sys, tag) {
  if (!tag || sys.presetTags.includes(tag)) return;
  const custom = getCustomTags(sys);
  if (!custom.includes(tag)) {
    custom.push(tag);
    localStorage.setItem(sys.storageKey, JSON.stringify(custom));
    refreshTagUI(sys.key);
  }
}
function refreshTagUI(sysKey, keepVal) {
  const sys  = SYSTEMS[sysKey];
  if (sys.noTag) return;
  const all  = getAllTags(sys);
  const mSel = document.getElementById(sysKey + '-m-tag-sel');
  if (!mSel) return;
  const mCur = keepVal !== undefined ? keepVal : mSel.value;
  mSel.innerHTML = '<option value="">请选择</option>' +
    all.map(c => `<option value="${c}"${c === mCur ? ' selected' : ''}>${c}</option>`).join('') +
    '<option value="__custom__">＋ 添加新类型…</option>';
  const fSel = document.getElementById(sysKey + '-f-tag');
  if (!fSel) return;
  const fCur = fSel.value;
  fSel.innerHTML = `<option value="">全部${sys.tagLabel}</option>` +
    all.map(c => `<option${c === fCur ? ' selected' : ''}>${c}</option>`).join('');
}
function onTagSelChange(sysKey) {
  const inp = document.getElementById(sysKey + '-m-tag-new');
  if (document.getElementById(sysKey + '-m-tag-sel').value === '__custom__') {
    inp.style.display = 'block'; inp.focus();
  } else {
    inp.style.display = 'none'; inp.value = '';
  }
}
function confirmNewTag(sysKey) {
  const inp = document.getElementById(sysKey + '-m-tag-new');
  const val = inp.value.trim();
  if (!val) return;
  saveCustomTag(SYSTEMS[sysKey], val);
  refreshTagUI(sysKey, val);
  inp.style.display = 'none'; inp.value = '';
}

// ════════════════════════════════════════════════════════════
//  飞书 API（通过 Cloudflare Worker 代理）
// ════════════════════════════════════════════════════════════
function getAuthHeaders() {
  var token = sessionStorage.getItem('ty_token') || '';
  return token ? { 'Authorization': 'Bearer ' + token } : {};
}
async function fetchAllRecords(apiUrl) {
  let items = [], pageToken = '';
  do {
    const url = apiUrl + (pageToken ? '?page_token=' + pageToken : '');
    console.log('fetchAllRecords: fetching', url);
    const res = await fetch(url, { headers: getAuthHeaders() });
    console.log('fetchAllRecords: response status', res.status);
    const d   = await res.json();
    console.log('fetchAllRecords: response code', d.code);
    if (d.code !== 0) throw new Error('读取数据失败：' + d.msg);
    items     = items.concat(d.data.items || []);
    pageToken = d.data.has_more ? d.data.page_token : '';
  } while (pageToken);
  return items;
}
async function createRecord(apiUrl, fields) {
  const res = await fetch(apiUrl, {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
    body: JSON.stringify({ fields }),
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('保存失败：' + d.msg);
}
async function updateRecord(apiUrl, recordId, fields) {
  const res = await fetch(apiUrl, {
    method: 'PATCH',
    headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
    body: JSON.stringify({ record_id: recordId, fields }),
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('更新失败：' + d.msg);
}
async function deleteRecord(apiUrl, recordId) {
  const res = await fetch(apiUrl + '?record_id=' + encodeURIComponent(recordId), {
    method: 'DELETE',
    headers: getAuthHeaders()
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('删除失败：' + d.msg);
}

// ════════════════════════════════════════════════════════════
//  加载与渲染
// ════════════════════════════════════════════════════════════
async function loadData(sysKey) {
  const sys = SYSTEMS[sysKey];
  debug('loadData START: ' + sysKey);
  showLoading(sysKey);
  try {
    debug('loadData fetchAllRecords: ' + sysKey);
    const items = await fetchAllRecords(sys.apiUrl);
    debug('loadData got ' + items.length + ' records for ' + sysKey);
    sys.records = items.map(item => {
      const f     = item.fields;
      const endTs = fts(f[sys.F.end]);
      return {
        id:       item.record_id,
        no:       fv(f[sys.F.no]),
        client:   fv(f[sys.F.client]),
        proj:     fv(f[sys.F.proj]),
        tag:      sys.F.tag     ? fv(f[sys.F.tag])      : '',
        contract: fnv(f[sys.F.contract]),
        infoFee:  sys.F.infoFee ? fnv(f[sys.F.infoFee]) : null,
        labFee:   sys.F.labFee  ? fnv(f[sys.F.labFee])  : null,
        start:    fd(f[sys.F.start]),
        endTs,    endFmt: endTs ? fdTs(endTs) : '',
        status:   fv(f[sys.F.status]),
        note:     fv(f[sys.F.note]),
        clientPay1: fnv(f[sys.F.clientPay1]),
        clientPay2: fnv(f[sys.F.clientPay2]),
        clientPay3: fnv(f[sys.F.clientPay3]),
        labPay1: fnv(f[sys.F.labPay1]),
        labPay2: fnv(f[sys.F.labPay2]),
        labPay3: fnv(f[sys.F.labPay3]),
        clientInvoice: fnv(f[sys.F.clientInvoice]),
        labInvoice:    fnv(f[sys.F.labInvoice]),
        infoFeeInvoice: fnv(f[sys.F.infoFeeInvoice]),
      };
    });
    if (!sys.noTag) sys.records.forEach(r => { if (r.tag) saveCustomTag(sys, r.tag); });
    refreshFilterDropdowns(sysKey);
    debug('applyFilters + renderTable: ' + sysKey);
    applyFilters(sysKey);
    renderStats(sysKey);
    debug('loadData DONE: ' + sysKey);
  } catch (err) {
    debug('loadData ERROR: ' + sysKey + ' ' + err.message);
    console.error('loadData ERROR for', sysKey, ':', err.message, err.stack);
    document.getElementById(sysKey + '-tbody').innerHTML =
      `<tr><td colspan="${sys.colCount}" class="state-msg" style="color:#dc2626">
        ⚠ ${err.message}<br>
        <small style="color:#aaa;margin-top:.5rem;display:block">
          请检查：飞书应用权限 → 多维表格读取权限是否已开启，且已将应用添加为表格协作者
        </small>
      </td></tr>`;
  }
}

function applyFilters(sysKey) {
  const sys    = SYSTEMS[sysKey];
  const q      = (document.getElementById(sysKey + '-search') || {}).value || '';
  const qLower = q.trim().toLowerCase();

  // 日期范围
  const dateFrom = (document.getElementById(sysKey + '-f-date-from') || {}).value || '';
  const dateTo   = (document.getElementById(sysKey + '-f-date-to') || {}).value || '';

  // 金额范围
  const amtMinEl = document.getElementById(sysKey + '-f-amount-min');
  const amtMaxEl = document.getElementById(sysKey + '-f-amount-max');
  const amtMin = amtMinEl && amtMinEl.value !== '' ? parseFloat(amtMinEl.value) : null;
  const amtMax = amtMaxEl && amtMaxEl.value !== '' ? parseFloat(amtMaxEl.value) : null;

  // 客户/实验室名称
  const clientEl = document.getElementById(sysKey + '-f-client');
  const client   = clientEl ? clientEl.value : '';

  // 状态
  const statusEl = document.getElementById(sysKey + '-f-status');
  const status   = statusEl ? statusEl.value : '';

  // 认证类型
  const tagEl = document.getElementById(sysKey + '-f-tag');
  const tag   = tagEl ? tagEl.value : '';

  // 付款状态（动态计算）
  const payEl = document.getElementById(sysKey + '-f-pay-status');
  const payStatus = payEl ? payEl.value : '';

  sys.filtered = sys.records.filter(r => {
    if (r.status === '已作废') return false;

    if (qLower && ![r.no, r.client, r.proj].some(v => v.toLowerCase().includes(qLower)))
      return false;

    if (dateFrom && r.start < dateFrom) return false;
    if (dateTo   && r.start > dateTo)   return false;

    if (amtMin !== null && !isNaN(amtMin) && (r.contract || 0) < amtMin) return false;
    if (amtMax !== null && !isNaN(amtMax) && (r.contract || 0) > amtMax) return false;

    if (client && r.client !== client) return false;

    if (status && r.status !== status) return false;

    if (tag && r.tag !== tag) return false;

    if (payStatus && !sys.noInfoFee) {
      const cp = calcPayStatus(r.contract, [r.clientPay1, r.clientPay2, r.clientPay3]);
      if (cp.status !== payStatus) return false;
    }

    return true;
  });
  sys.page = 1;
  renderTable(sysKey);
}

function refreshFilterDropdowns(sysKey) {
  const sys = SYSTEMS[sysKey];
  const el  = document.getElementById(sysKey + '-f-client');
  if (!el) return;
  const cur = el.value;
  const names = [...new Set(sys.records
    .filter(r => r.status !== '已作废' && r.client)
    .map(r => r.client))]
    .sort();
  el.innerHTML = `<option value="">全部${sys.clientLabel}</option>` +
    names.map(n => `<option value="${escHtml(n)}"${n === cur ? ' selected' : ''}>${escHtml(n)}</option>`).join('');

  if (sysKey === 'finance') {
    ['fin-f-date-from','fin-f-date-to','fin-f-amount-min','fin-f-amount-max'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = '';
    });
    ['fin-f-client','fin-f-client-pay-status','fin-f-lab-pay-status'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.selectedIndex = 0;
    });
    var s = document.getElementById('fin-search'); if (s) s.value = '';
    renderFinance();
  } else if (sysKey === 'void') {
    ['void-f-date-from','void-f-date-to','void-f-amount-min','void-f-amount-max'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = '';
    });
    var n = document.getElementById('void-f-name'); if (n) n.selectedIndex = 0;
    var s = document.getElementById('void-search'); if (s) s.value = '';
    renderVoidFiltered();
  } else {
    ['-f-date-from','-f-date-to','-f-amount-min','-f-amount-max'].forEach(function(suf) {
      var el = document.getElementById(sysKey + suf); if (el) el.value = '';
    });
    ['-f-client','-f-status','-f-pay-status'].forEach(function(suf) {
      var el = document.getElementById(sysKey + suf); if (el) el.selectedIndex = 0;
    });
    var tagEl = document.getElementById(sysKey + '-f-tag');
    if (tagEl) tagEl.selectedIndex = 0;
    var s = document.getElementById(sysKey + '-search'); if (s) s.value = '';
    applyFilters(sysKey);
  }
}

function renderTable(sysKey) {
  const sys   = SYSTEMS[sysKey];
  const tbody = document.getElementById(sysKey + '-tbody');
  const pgEl  = document.getElementById(sysKey + '-pagination');
  const total = sys.filtered.length;
  console.log('renderTable:', sysKey, 'total:', total, 'tbody:', !!tbody);
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const from  = (sys.page - 1) * PAGE_SIZE;
  const rows  = sys.filtered.slice(from, from + PAGE_SIZE);

  if (total === 0) {
    debug('renderTable ' + sysKey + ': 0 results');
    tbody.innerHTML = `<tr><td colspan="${sys.colCount}" class="state-msg">暂无订单数据</td></tr>`;
    pgEl.style.display = 'none';
    return;
  }

  const now  = Date.now();
  const week = 7 * 24 * 3600 * 1000;
  debug('renderTable ' + sysKey + ': building ' + rows.length + ' rows');
  try {
  tbody.innerHTML = rows.map(r => {
    const done    = TERMINAL.has(r.status) || ['已完成','已交付'].includes(r.status);
    const nearDue = r.endTs && !done && r.endTs > now && r.endTs < now + week;
    const isOver  = r.endTs && !done && r.endTs < now;
    const dueCls  = isOver ? 'overdue' : nearDue ? 'near-due' : '';
    const stOpts  = [...STATUS_FLOW, '已作废'].map(s =>
      `<option${s === r.status ? ' selected' : ''}>${s}</option>`).join('');

    if (r.id === sys.editingId) {
      let row = `<tr class="editing-row">
        <td><strong>${r.no || '—'}</strong></td>
        <td><input class="cell-input" id="${sysKey}-ei-client" type="text" value="${escHtml(r.client)}"></td>
        <td><input class="cell-input" id="${sysKey}-ei-proj"   type="text" value="${escHtml(r.proj)}"></td>`;
      if (!sys.noTag) {
        const tagOpts = ['', ...getAllTags(sys)].map(c =>
          `<option value="${escHtml(c)}"${c === r.tag ? ' selected' : ''}>${c || '请选择'}</option>`).join('');
        row += `<td><select class="cell-input" id="${sysKey}-ei-tag">${tagOpts}</select></td>`;
      }
      row += `<td><input class="cell-input" id="${sysKey}-ei-contract" type="number" min="0" step="0.01" value="${r.contract ?? ''}"></td>`;
      if (!sys.noInfoFee) row += `<td><input class="cell-input" id="${sysKey}-ei-info-fee" type="number" min="0" step="0.01" value="${r.infoFee ?? ''}"></td>`;
      if (!sys.noLabFee)  row += `<td><input class="cell-input" id="${sysKey}-ei-lab-fee"  type="number" min="0" step="0.01" value="${r.labFee  ?? ''}"></td>`;
      if (!sys.noProfit)  row += `<td>${fmtProfit(r.contract, r.infoFee, r.labFee)}</td>`;
      row += `
        <td><input class="cell-input" id="${sysKey}-ei-start"  type="date" value="${r.start}"></td>
        <td><input class="cell-input" id="${sysKey}-ei-end"    type="date" value="${r.endFmt}"></td>
        <td><select class="cell-input" id="${sysKey}-ei-status">${stOpts}</select></td>
        <td><input class="cell-input" id="${sysKey}-ei-note"   type="text" value="${escHtml(r.note)}"></td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <button class="btn-act btn-act-next" onclick="saveRowEdit('${sysKey}','${r.id}')">保存</button>
            <button class="btn-act" style="background:#f0f4fa;border-color:#e0e7f0;color:#555;" onclick="cancelRowEdit('${sysKey}')">取消</button>
            <button class="btn-act btn-act-del"  onclick="deleteOrder('${sysKey}','${r.id}','${r.no}')">删除</button>
          </div>
        </td>
      </tr>`;
      return row + paySubRow(sysKey, r);
    }

    const noteText = r.note ? r.note.replace(/"/g, '&quot;') : '';
    let row = `<tr>
      <td>${!sys.noInfoFee ? `<button class="exp-btn" id="exp-${sysKey}-${r.id}" onclick="togglePayRow('${sysKey}','${r.id}')" title="展开/收起付款明细">▶</button>` : ''}</td>
          <td><strong>${r.no || '—'}</strong></td>
      <td>${r.client || '—'}</td>
      <td>${r.proj   || '—'}</td>`;
    if (!sys.noTag)    row += `<td>${r.tag ? `<span class="cert-tag">${r.tag}</span>` : '—'}</td>`;
    row += `<td class="amount-cell">${fmtAmount(r.contract)}</td>`;
    if (!sys.noInfoFee) row += `<td class="amount-cell">${fmtAmount(r.infoFee)}</td>`;
    if (!sys.noLabFee)  row += `<td class="amount-cell">${fmtAmount(r.labFee)}</td>`;
    if (!sys.noProfit)  row += `<td>${fmtProfit(r.contract, r.infoFee, r.labFee)}</td>`;
    row += `
      <td>${r.start  || '—'}</td>
      <td class="${dueCls}">${r.endFmt || '—'}${nearDue ? ' ⚠' : ''}${isOver ? ' 已超期' : ''}</td>
      <td>${r.status ? `<span class="badge s-${r.status}">${r.status}</span>` : '—'}</td>
      <td style="color:#888;" title="${noteText}">${r.note || '—'}</td>
      <td><button class="btn-act btn-act-next" onclick="editRow('${sysKey}','${r.id}')">编辑</button></td>
    </tr>`;
    return row + paySubRow(sysKey, r);
  }).join('');
  } catch(e) {
    debug('renderTable ERROR: ' + sysKey + ' ' + e.message);
    tbody.innerHTML = `<tr><td colspan="${sys.colCount}" class="state-msg" style="color:#dc2626">渲染错误: ${e.message}</td></tr>`;
    return;
  }

  debug('renderTable ' + sysKey + ': HTML set, init resize');
  const tw = document.getElementById(sysKey + '-table-wrap');
  if (tw) initResizableColumns(tw.querySelector('table'), sys);
  console.log('renderTable: done, pages:', pages);

  if (pages <= 1) { pgEl.style.display = 'none'; return; }
  pgEl.style.display = 'flex';
  let html = `<button class="pg-btn" onclick="goPage('${sysKey}',${sys.page - 1})" ${sys.page === 1 ? 'disabled' : ''}>‹ 上一页</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 8 && Math.abs(i - sys.page) > 2 && i !== 1 && i !== pages) {
      if (i === sys.page - 3 || i === sys.page + 3) html += '<span class="pg-sep">…</span>';
      continue;
    }
    html += `<button class="pg-btn ${i === sys.page ? 'active' : ''}" onclick="goPage('${sysKey}',${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="goPage('${sysKey}',${sys.page + 1})" ${sys.page === pages ? 'disabled' : ''}>下一页 ›</button>`;
  html += `<span class="pg-info">共 ${total} 条</span>`;
  pgEl.innerHTML = html;
}

  if (sys.noInfoFee) return '';
  var cp = calcPayStatus(r.contract, [r.clientPay1, r.clientPay2, r.clientPay3]);
  var lp = calcPayStatus(r.labFee,    [r.labPay1, r.labPay2, r.labPay3]);
  var crColor = cp.remaining > 0 ? 'pay-remain' : 'pay-done';
  var lrColor = lp.remaining > 0 ? 'pay-remain' : 'pay-done';
  return `<tr class="pay-detail-row" id="pay-${sysKey}-${r.id}" style="display:none">
    <td colspan="${sys.colCount}">
      <div class="pay-detail-card">
        <div class="pay-group">

            <span class="pay-item">尾款 <strong>${fmtAmount(r.clientPay3)}</strong></span>

  document.getElementById(sysKey + '-s-total').textContent   = sys.records.filter(r => r.status !== '已作废').length;

  document.getElementById(sysKey + '-s-done').textContent    = sys.records.filter(r => ['已交付'].includes(r.status)).length;

function generateOrderNo(sysKey) {
  const sys    = SYSTEMS[sysKey];
  const user   = sessionStorage.getItem('ty_user') || '';
  const suffix = user === 'mindy' ? 'F' : 'L';
  const now = new Date();
  const y = now.getFullYear();
  const m = pad(now.getMonth() + 1);
  const d = pad(now.getDate());
  const regex = new RegExp('^' + sys.orderPfx + '\\d{8}[LF](\\d{4})$');
  let maxSeq = 20;
  sys.records.forEach(r => {
    const match = (r.no || '').match(regex);
    if (match) { const seq = parseInt(match[1], 10); if (seq > maxSeq) maxSeq = seq; }
  });
  return `${sys.orderPfx}${y}${m}${d}${suffix}${String(maxSeq + 1).padStart(4, '0')}`;
}

async function saveOrder(sysKey) {
  const sys    = SYSTEMS[sysKey];
  const no     = document.getElementById(sysKey + '-m-no').value.trim();
  const client = document.getElementById(sysKey + '-m-client').value.trim();
  const proj   = document.getElementById(sysKey + '-m-proj').value.trim();
  if (!no)     { alert('请选择或填写订单编号'); return; }
  if (!client) { alert(`请填写${sys.clientLabel}`); return; }
  if (!proj)   { alert('请填写项目名称'); return; }
  const btn = document.getElementById(sysKey + '-btn-save');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    const fields = {
      [sys.F.no]:     no,
      [sys.F.client]: client,
      [sys.F.proj]:   proj,
      [sys.F.status]: document.getElementById(sysKey + '-m-status').value,
    };
    if (!sys.noTag) {
      const tagSel = document.getElementById(sysKey + '-m-tag-sel').value;
      const tagNew = document.getElementById(sysKey + '-m-tag-new').value.trim();
      const tag    = tagSel === '__custom__' ? tagNew : tagSel;
      if (tag) { fields[sys.F.tag] = tag; saveCustomTag(sys, tag); }
    }
    const contract = parseFloat(document.getElementById(sysKey + '-m-contract').value);
    if (!isNaN(contract)) fields[sys.F.contract] = contract;
    if (!sys.noInfoFee) {
      const infoFee = parseFloat(document.getElementById(sysKey + '-m-info-fee').value);
      if (!isNaN(infoFee)) fields[sys.F.infoFee] = infoFee;
    }
    if (!sys.noLabFee) {
      const labFee = parseFloat(document.getElementById(sysKey + '-m-lab-fee').value);
      if (!isNaN(labFee)) fields[sys.F.labFee] = labFee;
    }
    const start = document.getElementById(sysKey + '-m-start').value;
    if (start) fields[sys.F.start] = new Date(start + 'T00:00:00').getTime();
    const end = document.getElementById(sysKey + '-m-end').value;
    if (end) fields[sys.F.end] = new Date(end + 'T00:00:00').getTime();
    const note = document.getElementById(sysKey + '-m-note').value.trim();
    if (note) fields[sys.F.note] = note;

    await createRecord(sys.apiUrl, fields);
    closeModal(sysKey);
    await loadData(sysKey);
  } catch (err) {
    alert(err.message);
    btn.disabled = false; btn.textContent = '保存';
  }
}

// ════════════════════════════════════════════════════════════
//  可调节列宽
// ════════════════════════════════════════════════════════════
function initResizableColumns(table, sys) {
  if (!table) return;
  const ths = Array.from(table.querySelectorAll('thead th'));
  if (sys.colWidths.length === ths.length) {
    ths.forEach((th, i) => { th.style.width = sys.colWidths[i]; });
  } else {
    ths.forEach(th => { th.style.width = th.offsetWidth + 'px'; });
    sys.colWidths = ths.map(th => th.style.width);
  }
  table.style.tableLayout = 'fixed';
  ths.forEach((th, i) => {
    if (th.querySelector('.resize-handle')) return;
    const h = document.createElement('div');
    h.className = 'resize-handle';
    th.appendChild(h);
    let x0, w0;
    h.addEventListener('mousedown', e => {
      x0 = e.pageX; w0 = th.offsetWidth;
      h.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      const onMove = e => {
        const w = Math.max(40, w0 + e.pageX - x0);
        th.style.width = w + 'px';
        sys.colWidths[i] = w + 'px';
      };
      const onUp = () => {
        h.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    });
  });
}

// ════════════════════════════════════════════════════════════
//  共享辅助函数
// ════════════════════════════════════════════════════════════
function fv(val) {
  if (val == null) return '';
  if (typeof val === 'string') return val;
  if (typeof val === 'number') return String(val);
  if (Array.isArray(val)) return val.map(v => typeof v === 'string' ? v : (v.text || v.value || '')).join('');
  if (typeof val === 'object') return val.value || val.text || '';
  return String(val);
}
function fnv(val) {
  if (val == null) return null;
  if (typeof val === 'number') return val;
  if (typeof val === 'object' && val.value != null) return Number(val.value);
  const n = parseFloat(val);
  return isNaN(n) ? null : n;
}
function fmtAmount(val) {
  if (val == null) return '—';
  return '¥' + val.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtProfit(contract, infoFee, labFee) {
  if (contract == null && infoFee == null && labFee == null) return '—';
  const profit = (contract || 0) - (infoFee || 0) - (labFee || 0);
  const cls    = profit >= 0 ? 'profit-pos' : 'profit-neg';
  return `<span class="${cls}">¥${profit.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}</span>`;
}
function fts(val) {
  if (!val) return null;
  if (typeof val === 'number') return val;
  if (typeof val === 'object' && val.value) return Number(val.value);
  return null;
}
function fdTs(ts) {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function fd(val) { return val ? fdTs(fts(val) || 0) : ''; }
function pad(n)  { return String(n).padStart(2, '0'); }
function today() { return new Date().toISOString().slice(0, 10); }

    if (!window._finBuilt) { buildFinancePanel(); window._finBuilt = true; }
    loadFinance();
    return;
  }
  if (sysKey === 'ledger') {
    ['cert','lab','finance','void'].forEach(k => {
      document.getElementById('panel-' + k).classList.remove('active');
      document.getElementById('tab-btn-' + k).classList.remove('active');
    });
    document.getElementById('panel-ledger').classList.add('active');
    document.getElementById('tab-btn-ledger').classList.add('active');
    document.getElementById('h-tab-title').textContent = '账本统计';
    try {
      if (!window._ledgerBuilt) { buildLedgerPanel(); window._ledgerBuilt = true; }
      loadLedger();
    } catch(e) {
      debug('ledger switch error: ' + e.message);
      document.getElementById('panel-ledger').innerHTML = '<main><div class="state-msg" style="color:#dc2626;">初始化失败：' + e.message + '</div></main>';
    }
    return;
  }
  if (sysKey === 'void') {
    ['cert','lab','finance','ledger'].forEach(k => {
      document.getElementById('panel-' + k).classList.remove('active');
      document.getElementById('tab-btn-' + k).classList.remove('active');
    });
    document.getElementById('panel-void').classList.add('active');
    document.getElementById('tab-btn-void').classList.add('active');
    document.getElementById('h-tab-title').textContent = '已作废订单';
    if (!window._voidBuilt) { buildVoidPanel(); window._voidBuilt = true; }
    loadVoid();
    return;
  }
  ['cert','lab'].forEach(k => {
    document.getElementById('panel-' + k).classList.toggle('active', k === sysKey);
    document.getElementById('tab-btn-' + k).classList.toggle('active', k === sysKey);
  });
  document.getElementById('panel-finance').classList.remove('active');
  document.getElementById('tab-btn-finance').classList.remove('active');
  document.getElementById('panel-ledger').classList.remove('active');
  document.getElementById('tab-btn-ledger').classList.remove('active');
  document.getElementById('panel-void').classList.remove('active');
  document.getElementById('tab-btn-void').classList.remove('active');
  document.getElementById('h-tab-title').textContent = SYSTEMS[sysKey].name;
}

function calcPayStatus(total, payments) {
  var paid = payments.reduce(function(a, b) { return a + (b || 0); }, 0);
  var remaining = (total || 0) - paid;
  if (total && total > 0) {
    if (remaining <= 0) return { paid: paid, remaining: 0, status: '已结清', cls: 's-已结清' };
    if (paid > 0) return { paid: paid, remaining: remaining, status: '部分付款', cls: 's-部分付款' };
    return { paid: 0, remaining: remaining, status: '未付款', cls: 's-未付款' };
  }
  return { paid: 0, remaining: 0, status: '—', cls: '' };
}

var editingFinanceId = null;

function renderFinance() {
  var records = SYSTEMS.cert.records;
  var q = (document.getElementById('fin-search') || {}).value;
  q = q ? q.trim().toLowerCase() : '';

  // 筛选栏输入
  var dateFrom  = (document.getElementById('fin-f-date-from') || {}).value || '';
  var dateTo    = (document.getElementById('fin-f-date-to') || {}).value || '';
  var amtMinEl  = document.getElementById('fin-f-amount-min');
  var amtMaxEl  = document.getElementById('fin-f-amount-max');
  var amtMin    = amtMinEl && amtMinEl.value !== '' ? parseFloat(amtMinEl.value) : null;
  var amtMax    = amtMaxEl && amtMaxEl.value !== '' ? parseFloat(amtMaxEl.value) : null;
  var client    = (document.getElementById('fin-f-client') || {}).value || '';
  var clientPay = (document.getElementById('fin-f-client-pay-status') || {}).value || '';
  var labPay    = (document.getElementById('fin-f-lab-pay-status') || {}).value || '';

  // 只统计正式合同及之后状态（排除暂时合同、已作废）
  var VALID_FINANCE_STATUS = ['正式合同','检测中','证书申请中','已交付'];
  var filtered = records.filter(function(r) {
    if (VALID_FINANCE_STATUS.indexOf(r.status) === -1) return false;
    if (q && ![r.no, r.client].some(function(v) { return v.toLowerCase().indexOf(q) !== -1; })) return false;
    if (dateFrom && r.start < dateFrom) return false;
    if (dateTo   && r.start > dateTo)   return false;
    if (amtMin !== null && !isNaN(amtMin) && (r.contract || 0) < amtMin) return false;
    if (amtMax !== null && !isNaN(amtMax) && (r.contract || 0) > amtMax) return false;
    if (client && r.client !== client) return false;
    if (clientPay) {
      var cp = calcPayStatus(r.contract, [r.clientPay1, r.clientPay2, r.clientPay3]);
      if (cp.status !== clientPay) return false;
    }
    if (labPay) {
      var lp = calcPayStatus(r.labFee, [r.labPay1, r.labPay2, r.labPay3]);
      if (lp.status !== labPay) return false;
    }
    return true;
  });

  var totalContract = 0, totalInfoFee = 0, totalProfit = 0;
  var totalClientPaid = 0, totalClientRemain = 0;
  var totalLab = 0, totalLabPaid = 0, totalLabRemain = 0;
  var totalClientInvoice = 0, totalLabInvoice = 0, totalInfoFeeInvoice = 0;

  var rows = filtered.map(function(r) {
    var client = calcPayStatus(r.contract, [r.clientPay1, r.clientPay2, r.clientPay3]);
    var lab    = calcPayStatus(r.labFee,    [r.labPay1, r.labPay2, r.labPay3]);
    var infoFee = (r.infoFee || 0);
    var profit  = (r.contract || 0) - infoFee - (r.labFee || 0);

    totalContract    += (r.contract || 0);
    totalInfoFee     += infoFee;
    totalProfit      += profit;
    totalClientPaid  += client.paid;
    totalClientRemain += client.remaining;
    totalLab         += (r.labFee || 0);
    totalLabPaid     += lab.paid;
    totalLabRemain   += lab.remaining;
    totalClientInvoice  += (r.clientInvoice || 0);
    totalLabInvoice     += (r.labInvoice || 0);
    totalInfoFeeInvoice += (r.infoFeeInvoice || 0);

    return { r: r, client: client, lab: lab, infoFee: infoFee, profit: profit };
  });

  // stats
  var statsEl = document.getElementById('fin-stats');
  if (statsEl) {
    statsEl.innerHTML =
      '<div class="stat-card"><div class="num">' + fmtAmount(totalContract) + '</div><div class="lbl">合同总额</div></div>' +
      '<div class="stat-card"><div class="num" style="color:#16a34a;">' + fmtAmount(totalClientPaid) + '</div><div class="lbl">客户已付</div></div>' +
      '<div class="stat-card warn"><div class="num">' + fmtAmount(totalClientRemain) + '</div><div class="lbl">客户待付</div></div>' +
      '<div class="stat-card"><div class="num">' + fmtAmount(totalLab) + '</div><div class="lbl">实验室总额</div></div>' +
      '<div class="stat-card"><div class="num" style="color:#16a34a;">' + fmtAmount(totalLabPaid) + '</div><div class="lbl">实验室已付</div></div>' +
      '<div class="stat-card warn"><div class="num">' + fmtAmount(totalLabRemain) + '</div><div class="lbl">实验室待付</div></div>' +
      '<div class="stat-card"><div class="num">' + fmtAmount(totalInfoFee) + '</div><div class="lbl">信息费总额</div></div>' +
      '<div class="stat-card"><div class="num" style="color:' + (totalProfit >= 0 ? '#065f46' : '#dc2626') + ';">' + fmtAmount(totalProfit) + '</div><div class="lbl">利润总额</div></div>' +
      '<div class="stat-card"><div class="num">' + fmtAmount(totalClientInvoice) + '</div><div class="lbl">客户发票额</div></div>' +
      '<div class="stat-card"><div class="num">' + fmtAmount(totalLabInvoice) + '</div><div class="lbl">实验室发票</div></div>' +
      '<div class="stat-card"><div class="num">' + fmtAmount(totalInfoFeeInvoice) + '</div><div class="lbl">信息费发票</div></div>';
  }

  // table
  if (filtered.length === 0) {
    document.getElementById('fin-tbody').innerHTML =
      '<tr><td colspan="22" class="state-msg">暂无数据</td></tr>';
    return;
  }

  document.getElementById('fin-tbody').innerHTML = rows.map(function(row) {
    var r = row.r, c = row.client, l = row.lab;
    var crColor = c.remaining > 0 ? 'color:#dc2626;font-weight:600;' : 'color:#16a34a;font-weight:600;';
    var lrColor = l.remaining > 0 ? 'color:#dc2626;font-weight:600;' : 'color:#16a34a;font-weight:600;';

    if (r.id === editingFinanceId) {
      return '<tr class="editing-row">' +
        '<td><strong>' + (r.no || '—') + '</strong></td>' +
        '<td>' + (r.client || '—') + '</td>' +
        '<td><input class="cell-input" id="fin-ei-contract" type="number" min="0" step="0.01" value="' + (r.contract ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-info-fee" type="number" min="0" step="0.01" value="' + (r.infoFee ?? '') + '"></td>' +
        '<td class="amount-cell" style="color:' + (row.profit >= 0 ? '#065f46' : '#dc2626') + ';font-weight:600;">' + fmtAmount(row.profit) + '</td>' +
        '<td><input class="cell-input" id="fin-ei-cp1" type="number" min="0" step="0.01" value="' + (r.clientPay1 ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-cp2" type="number" min="0" step="0.01" value="' + (r.clientPay2 ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-cp3" type="number" min="0" step="0.01" value="' + (r.clientPay3 ?? '') + '"></td>' +
        '<td class="amount-cell" style="font-weight:600;">' + fmtAmount(c.paid) + '</td>' +
        '<td class="amount-cell" style="' + crColor + '">' + (c.remaining > 0 ? fmtAmount(c.remaining) : '—') + '</td>' +
        '<td><span class="badge ' + c.cls + '">' + c.status + '</span></td>' +
        '<td><input class="cell-input" id="fin-ei-lab-fee" type="number" min="0" step="0.01" value="' + (r.labFee ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-lp1" type="number" min="0" step="0.01" value="' + (r.labPay1 ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-lp2" type="number" min="0" step="0.01" value="' + (r.labPay2 ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-lp3" type="number" min="0" step="0.01" value="' + (r.labPay3 ?? '') + '"></td>' +
        '<td class="amount-cell" style="font-weight:600;">' + fmtAmount(l.paid) + '</td>' +
        '<td class="amount-cell" style="' + lrColor + '">' + (l.remaining > 0 ? fmtAmount(l.remaining) : '—') + '</td>' +
        '<td><span class="badge ' + l.cls + '">' + l.status + '</span></td>' +
        '<td><input class="cell-input" id="fin-ei-cli-inv" type="number" min="0" step="0.01" value="' + (r.clientInvoice ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-lab-inv" type="number" min="0" step="0.01" value="' + (r.labInvoice ?? '') + '"></td>' +
        '<td><input class="cell-input" id="fin-ei-info-inv" type="number" min="0" step="0.01" value="' + (r.infoFeeInvoice ?? '') + '"></td>' +
        '<td><div style="display:flex;gap:4px;flex-wrap:wrap;">' +
        '<button class="btn-act btn-act-next" onclick="saveFinanceEdit(\'' + r.id + '\')">保存</button>' +
        '<button class="btn-act" style="background:#f0f4fa;border-color:#e0e7f0;color:#555;" onclick="cancelFinanceEdit()">取消</button>' +
        '</div></td>' +
        '</tr>';
    }

    return '<tr>' +
      '<td><strong>' + (r.no || '—') + '</strong></td>' +
      '<td>' + (r.client || '—') + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.contract) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(row.infoFee) + '</td>' +
      '<td class="amount-cell" style="color:' + (row.profit >= 0 ? '#065f46' : '#dc2626') + ';font-weight:600;">' + fmtAmount(row.profit) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.clientPay1) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.clientPay2) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.clientPay3) + '</td>' +
      '<td class="amount-cell" style="font-weight:600;">' + fmtAmount(c.paid) + '</td>' +
      '<td class="amount-cell" style="' + crColor + '">' + (c.remaining > 0 ? fmtAmount(c.remaining) : '—') + '</td>' +
      '<td><span class="badge ' + c.cls + '">' + c.status + '</span></td>' +
      '<td class="amount-cell">' + fmtAmount(r.labFee) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.labPay1) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.labPay2) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.labPay3) + '</td>' +
      '<td class="amount-cell" style="font-weight:600;">' + fmtAmount(l.paid) + '</td>' +
      '<td class="amount-cell" style="' + lrColor + '">' + (l.remaining > 0 ? fmtAmount(l.remaining) : '—') + '</td>' +
      '<td><span class="badge ' + l.cls + '">' + l.status + '</span></td>' +
      '<td class="amount-cell">' + fmtAmount(r.clientInvoice) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.labInvoice) + '</td>' +
      '<td class="amount-cell">' + fmtAmount(r.infoFeeInvoice) + '</td>' +
      '<td><button class="btn-act btn-act-next" onclick="editFinanceRow(\'' + r.id + '\')">编辑</button></td>' +
      '</tr>';
  }).join('');
  var ft = document.querySelector('#panel-finance table');
  if (ft) initResizableColumns(ft, { colWidths: FIN_COL_WIDTHS });
}

async function saveFinanceEdit(recordId) {
  var sys = SYSTEMS.cert;
  try {
    var fields = {};
    var v;
    var localUpdates = {};  // 同步更新本地记录

    v = parseFloat(document.getElementById('fin-ei-contract').value);
    if (!isNaN(v)) { fields[sys.F.contract] = v; localUpdates.contract = v; }
    v = parseFloat(document.getElementById('fin-ei-info-fee').value);
    if (!isNaN(v)) { fields[sys.F.infoFee] = v; localUpdates.infoFee = v; }
    v = parseFloat(document.getElementById('fin-ei-cp1').value);
    if (!isNaN(v)) { fields[sys.F.clientPay1] = v; localUpdates.clientPay1 = v; }
    v = parseFloat(document.getElementById('fin-ei-cp2').value);
    if (!isNaN(v)) { fields[sys.F.clientPay2] = v; localUpdates.clientPay2 = v; }
    v = parseFloat(document.getElementById('fin-ei-cp3').value);
    if (!isNaN(v)) { fields[sys.F.clientPay3] = v; localUpdates.clientPay3 = v; }
    v = parseFloat(document.getElementById('fin-ei-lab-fee').value);
    if (!isNaN(v)) { fields[sys.F.labFee] = v; localUpdates.labFee = v; }
    v = parseFloat(document.getElementById('fin-ei-lp1').value);
    if (!isNaN(v)) { fields[sys.F.labPay1] = v; localUpdates.labPay1 = v; }
    v = parseFloat(document.getElementById('fin-ei-lp2').value);
    if (!isNaN(v)) { fields[sys.F.labPay2] = v; localUpdates.labPay2 = v; }
    v = parseFloat(document.getElementById('fin-ei-lp3').value);
    if (!isNaN(v)) { fields[sys.F.labPay3] = v; localUpdates.labPay3 = v; }
    v = parseFloat(document.getElementById('fin-ei-cli-inv').value);
    if (!isNaN(v)) { fields[sys.F.clientInvoice] = v; localUpdates.clientInvoice = v; }
    v = parseFloat(document.getElementById('fin-ei-lab-inv').value);
    if (!isNaN(v)) { fields[sys.F.labInvoice] = v; localUpdates.labInvoice = v; }
    v = parseFloat(document.getElementById('fin-ei-info-inv').value);
    if (!isNaN(v)) { fields[sys.F.infoFeeInvoice] = v; localUpdates.infoFeeInvoice = v; }

    // 先更新飞书
    await updateRecord(sys.apiUrl, recordId, fields);

    // 立即更新本地内存中的记录，绕过飞书读取延迟
    var rec = sys.records.find(function(r) { return r.id === recordId; });
    if (rec) {
      Object.keys(localUpdates).forEach(function(k) { rec[k] = localUpdates[k]; });
    }

    editingFinanceId = null;
    renderFinance();
    debug('save OK: clientInvoice=' + rec.clientInvoice + ' labInvoice=' + rec.labInvoice + ' infoFeeInvoice=' + rec.infoFeeInvoice);
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

    + '<th>订单编号</th><th>实验室名称</th><th>项目名称</th>'
    + '<th>合同额</th><th>提交日期</th><th>预计完成日期</th><th>备注</th><th>操作</th>'
    + '</tr></thead>'
    + '<tbody id="void-lab-tbody">'
    + '<tr><td colspan="8" class="state-msg"><span class="spinner"></span>加载中…</td></tr>'
    + '</tbody>'
    + '</table></div>'
    + '</div>'
    + '</main>';
}

function loadVoid() {
  var certSys = SYSTEMS.cert;
  var labSys  = SYSTEMS.lab;
  var needCert = !certSys.records || certSys.records.length === 0;
  var needLab  = !labSys.records || labSys.records.length === 0;

  function proceed() {
    refreshVoidFilterDropdowns();
    renderVoidFiltered();
  }

  var promises = [];
  if (needCert) promises.push(loadData('cert'));
  if (needLab)  promises.push(loadData('lab'));

  if (promises.length > 0) {
    Promise.all(promises).then(proceed).catch(function(err) {
      debug('loadVoid ERROR: ' + err.message);
    });
  } else {
    proceed();
  }
}

function renderVoidFiltered() {
  var certSys = SYSTEMS.cert;
  var labSys  = SYSTEMS.lab;

  // 读取筛选栏输入
  var q = (document.getElementById('void-search') || {}).value || '';
  var qLower = q.trim().toLowerCase();
  var dateFrom = (document.getElementById('void-f-date-from') || {}).value || '';
  var dateTo   = (document.getElementById('void-f-date-to') || {}).value || '';
  var amtMinEl = document.getElementById('void-f-amount-min');
  var amtMaxEl = document.getElementById('void-f-amount-max');
  var amtMin = amtMinEl && amtMinEl.value !== '' ? parseFloat(amtMinEl.value) : null;
  var amtMax = amtMaxEl && amtMaxEl.value !== '' ? parseFloat(amtMaxEl.value) : null;
  var nameVal = (document.getElementById('void-f-name') || {}).value || '';

  function filterVoid(list) {
    return list.filter(function(r) {
      if (r.status !== '已作废') return false;
      if (qLower && ![r.no, r.client, r.proj].some(function(v) { return v.toLowerCase().indexOf(qLower) !== -1; })) return false;
      if (dateFrom && r.start < dateFrom) return false;
      if (dateTo   && r.start > dateTo)   return false;
      if (amtMin !== null && !isNaN(amtMin) && (r.contract || 0) < amtMin) return false;
      if (amtMax !== null && !isNaN(amtMax) && (r.contract || 0) > amtMax) return false;
      if (nameVal && r.client !== nameVal) return false;
      return true;
    });
  }

  var certVoid = filterVoid(certSys.records);
  var labVoid  = filterVoid(labSys.records);

  var statsEl = document.getElementById('void-stats');
  if (statsEl) {
    statsEl.innerHTML =
      '<div class="stat-card"><div class="num">' + (certVoid.length + labVoid.length) + '</div><div class="lbl">已作废订单合计</div></div>' +
      '<div class="stat-card"><div class="num">' + certVoid.length + '</div><div class="lbl">认证已作废</div></div>' +
      '<div class="stat-card"><div class="num">' + labVoid.length + '</div><div class="lbl">实验室已作废</div></div>' +
      '<div class="stat-card warn"><div class="num">¥' +
        certVoid.reduce(function(s, r) { return s + (r.contract || 0); }, 0).toLocaleString('zh-CN') +
      '</div><div class="lbl">作废合同额合计</div></div>';
  }

  var certTbody = document.getElementById('void-cert-tbody');
  if (certTbody) {
    if (certVoid.length === 0) {
      certTbody.innerHTML = '<tr><td colspan="9" class="state-msg">暂无已作废的认证订单</td></tr>';
    } else {
      certTbody.innerHTML = certVoid.map(function(r) {
        return '<tr>'
          + '<td><strong>' + (r.no || '—') + '</strong></td>'
          + '<td>' + (r.client || '—') + '</td>'
          + '<td>' + (r.proj || '—') + '</td>'
          + '<td>' + (r.tag ? '<span class="cert-tag">' + r.tag + '</span>' : '—') + '</td>'
          + '<td class="amount-cell">' + fmtAmount(r.contract) + '</td>'
          + '<td>' + (r.start || '—') + '</td>'
          + '<td>' + (r.endFmt || '—') + '</td>'
          + '<td style="color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + escHtml(r.note || '') + '">' + (r.note || '—') + '</td>'
          + '<td><button class="btn-act btn-act-next" onclick="restoreOrder(\'cert\',\'' + r.id + '\',\'' + (r.no || '') + '\')">恢复</button></td>'
          + '</tr>';
      }).join('');
    }
  }

  var labTbody = document.getElementById('void-lab-tbody');
  if (labTbody) {
    if (labVoid.length === 0) {
      labTbody.innerHTML = '<tr><td colspan="8" class="state-msg">暂无已作废的实验室订单</td></tr>';
    } else {
      labTbody.innerHTML = labVoid.map(function(r) {
        return '<tr>'
          + '<td><strong>' + (r.no || '—') + '</strong></td>'
          + '<td>' + (r.client || '—') + '</td>'
          + '<td>' + (r.proj || '—') + '</td>'
          + '<td class="amount-cell">' + fmtAmount(r.contract) + '</td>'
          + '<td>' + (r.start || '—') + '</td>'
          + '<td>' + (r.endFmt || '—') + '</td>'
          + '<td style="color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + escHtml(r.note || '') + '">' + (r.note || '—') + '</td>'
          + '<td><button class="btn-act btn-act-next" onclick="restoreOrder(\'lab\',\'' + r.id + '\',\'' + (r.no || '') + '\')">恢复</button></td>'
          + '</tr>';
      }).join('');
    }
  }
}

async function restoreOrder(sysKey, recordId, orderNo) {
  if (!confirm('确认将订单 ' + orderNo + ' 恢复为"暂时合同"状态？')) return;
  var sys = SYSTEMS[sysKey];
  try {
    await updateRecord(sys.apiUrl, recordId, { [sys.F.status]: '暂时合同' });
    await loadData(sysKey);
    loadVoid();
    renderStats(sysKey);
    applyFilters(sysKey);
  } catch (err) { alert('恢复失败：' + err.message); }
}

// ════════════════════════════════════════════════════════════
//  账本统计
// ════════════════════════════════════════════════════════════
var LEDGER_DATA = [];
var _ledgerFiltered = [];

function buildLedgerPanel() {
  document.getElementById('panel-ledger').innerHTML = `
    <main>
      <div class="stats" id="ledger-stats">
        <div class="stat-card"><div class="num" id="led-s-income">—</div><div class="lbl">总收入</div></div>
        <div class="stat-card"><div class="num" id="led-s-expense">—</div><div class="lbl">总支出</div></div>
        <div class="stat-card"><div class="num" id="led-s-net">—</div><div class="lbl">净额</div></div>
        <div class="stat-card"><div class="num" id="led-s-count">—</div><div class="lbl">总笔数</div></div>
      </div>
      <div class="controls">
        <button class="btn-refresh" onclick="loadLedger()">↻ 刷新</button>
        <select class="ctrl-select" id="led-filter-type" onchange="renderLedger()">
          <option value="">全部类型</option>
          <option value="收入">收入</option>
          <option value="支出">支出</option>
        </select>
        <select class="ctrl-select" id="led-filter-cat" onchange="renderLedger()">
          <option value="">全部类目</option>
        </select>
        <input class="search-input" type="month" id="led-filter-month" onchange="renderLedger()" style="width:150px;">
        <input class="search-input" id="led-search" type="text" placeholder="搜索备注/订单号…" oninput="renderLedger()" style="width:180px;">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>日期</th><th>类型</th><th>类目</th><th>合同额（元）</th><th>备注</th>
          </tr></thead>
          <tbody id="led-tbody">
            <tr><td colspan="5" class="state-msg"><span class="spinner"></span>加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </main>`;
}

async function loadLedger() {
  var tbody = document.getElementById('led-tbody');
  if (!tbody) { debug('led-tbody not found'); return; }
  tbody.innerHTML = '<tr><td colspan="5" class="state-msg"><span class="spinner"></span>加载中…</td></tr>';

  try {
    var token = sessionStorage.getItem('ty_token');
    debug('ledger token=' + (token ? token.substring(0,20)+'...' : 'null'));
    if (!token) { logout(); return; }

    var all = [];
    var pt = '';
    do {
      var url = '/api/ledger?page_size=500' + (pt ? '&page_token=' + pt : '');
      debug('ledger fetch: ' + url);
      var resp = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      debug('ledger resp status=' + resp.status);
      if (resp.status === 401) { logout(); return; }
      var d = await resp.json();
      debug('ledger data: ' + JSON.stringify(d).substring(0, 200));
      if (d.code && d.code !== 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="state-msg" style="color:#dc2626;">飞书API错误：' + (d.msg || d.code) + '</td></tr>';
        return;
      }
      if (d.data && d.data.items) {
        all = all.concat(d.data.items);
      }
      pt = (d.data && d.data.has_more) ? d.data.page_token : '';
    } while (pt);

    LEDGER_DATA = all.map(function(item) {
      var f = item.fields || {};
      var rawDate = f['日期'] || '';
      return {
        id: item.record_id || item.id || '',
        date: fd(rawDate),
        type: f['进出'] || f['类型'] || '',
        category: f['类目'] || '',
        amount: parseFloat(f['合同额'] || f['金额'] || 0) || 0,
        note: f['备注'] || '',
        orderNo: f['订单编号'] || '',
      };
    });

    // Update category filter
    var cats = new Set();
    LEDGER_DATA.forEach(function(r) { if (r.category) cats.add(r.category); });
    var catSel = document.getElementById('led-filter-cat');
    if (catSel) {
      catSel.innerHTML = '<option value="">全部类目</option>' +
        Array.from(cats).sort().map(function(c) { return '<option>' + c + '</option>'; }).join('');
    }

    renderLedger();
  } catch (e) {
    console.error('loadLedger error:', e);
    tbody.innerHTML = '<tr><td colspan="5" class="state-msg" style="color:#dc2626;">加载失败：' + e.message + '</td></tr>';
  }
}

function renderLedger() {
  var type = document.getElementById('led-filter-type')?.value || '';
  var cat = document.getElementById('led-filter-cat')?.value || '';
  var month = document.getElementById('led-filter-month')?.value || '';
  var search = (document.getElementById('led-search')?.value || '').toLowerCase();

  _ledgerFiltered = LEDGER_DATA.filter(function(r) {
    if (type && r.type !== type) return false;
    if (cat && r.category !== cat) return false;
    if (month && !String(r.date).startsWith(month)) return false;
    if (search) {
      var hay = (r.note + ' ' + r.orderNo + ' ' + r.category).toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    return true;
  });

  // Stats
  var income = 0, expense = 0;
  _ledgerFiltered.forEach(function(r) {
    if (r.type === '收入') income += r.amount;
    else expense += r.amount;
  });
  var net = income - expense;

  document.getElementById('led-s-income').textContent = '¥' + income.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
  document.getElementById('led-s-expense').textContent = '¥' + expense.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
  document.getElementById('led-s-net').textContent = (net >= 0 ? '¥' : '-¥') + Math.abs(net).toLocaleString('zh-CN', { minimumFractionDigits: 2 });
  document.getElementById('led-s-net').style.color = net >= 0 ? '#065f46' : '#dc2626';
  document.getElementById('led-s-count').textContent = _ledgerFiltered.length;

  // Table
  var tbody = document.getElementById('led-tbody');
  if (!_ledgerFiltered.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="state-msg">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = _ledgerFiltered.map(function(r) {
    var isIncome = r.type === '收入';
    return '<tr>'
      + '<td>' + (r.date || '—') + '</td>'
      + '<td><span style="color:' + (isIncome ? '#065f46' : '#dc2626') + ';font-weight:600;">' + (r.type || '—') + '</span></td>'
      + '<td>' + (r.category || '—') + '</td>'
      + '<td class="amount-cell" style="color:' + (isIncome ? '#065f46' : '#dc2626') + ';">' + (isIncome ? '+' : '-') + '¥' + r.amount.toLocaleString('zh-CN', { minimumFractionDigits: 2 }) + '</td>'
      + '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + escHtml(r.note || '') + '">' + (r.note || '—') + '</td>'
      + '</tr>';
  }).join('');
}

</script>
