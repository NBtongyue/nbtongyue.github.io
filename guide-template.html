  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: "微软雅黑", "Helvetica Neue", Arial, sans-serif; color: #333; font-size: 16px; background: #f4f7fc; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid #e0e0e0;
      padding: 0 4rem; display: flex;
      justify-content: space-between; align-items: center;
      height: 68px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .nav-logo { display: flex; flex-direction: row; align-items: center; gap: 0.7rem; text-decoration: none; }
    .nav-logo img { height: 46px; width: auto; display: block; }
    .nav-logo-text { display: flex; flex-direction: column; line-height: 1.3; }
    .nav-logo-text .cn { font-size: 1rem; font-weight: 700; color: #1b3a6b; }
    .nav-logo-text .en { font-size: 0.62rem; color: #888; letter-spacing: 0.03em; }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-back { text-decoration: none; color: #1b3a6b; font-size: 0.9rem; font-weight: 600; }
    .nav-back:hover { color: #2563a8; }
    .lang-switcher { display: flex; align-items: center; gap: 0.35rem; }
    .lang-btn { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 0.2rem 0.65rem; font-size: 0.82rem; cursor: pointer; color: #666; font-family: inherit; transition: all 0.2s; }
    .lang-btn.active { border-color: #1b3a6b; color: #1b3a6b; font-weight: 700; background: #f0f5ff; }
    .lang-btn:hover { border-color: #1b3a6b; color: #1b3a6b; }
    .lang-sep { color: #ddd; }

    .page-hero {
      background: linear-gradient(135deg, #1b3a6b 0%, #2563a8 100%);
      color: #fff; text-align: center; padding: 4rem 2rem 3rem;
    }
    .page-hero .flag { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .page-hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .page-hero p { font-size: 1rem; color: rgba(255,255,255,0.75); }

    .content { max-width: 860px; margin: 2.5rem auto 4rem; padding: 0 1.5rem; }

    /* 简介卡片 */
    .intro-card {
      background: #fff; border: 1px solid #dde4ef; border-radius: 10px;
      padding: 1.5rem 1.8rem; margin-bottom: 2rem;
    }
    .intro-card h2 { font-size: 1.2rem; color: #1b3a6b; margin-bottom: 0.8rem; }
    .intro-card p { font-size: 0.9rem; color: #555; line-height: 1.8; }

    /* 手风琴 */
    .accordion { border: 1px solid #dde4ef; border-radius: 8px; margin-bottom: 0.8rem; background: #fff; overflow: hidden; }
    .accordion-header {
      width: 100%; background: none; border: none; text-align: left;
      padding: 1rem 1.2rem; font-size: 1rem; font-weight: 700; color: #1b3a6b;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      font-family: inherit;
    }
    .accordion-header:hover { background: #f0f5ff; }
    .accordion-arrow { transition: transform 0.25s; font-style: normal; }
    .accordion.open .accordion-arrow { transform: rotate(180deg); }
    .accordion-body { display: none; padding: 0 1.2rem 1.2rem; }
    .accordion.open .accordion-body { display: block; }
    .accordion-body p { font-size: 0.9rem; color: #444; line-height: 1.8; margin-bottom: 0.6rem; }
    .accordion-body ul { padding-left: 1.2rem; margin-bottom: 0.6rem; }
    .accordion-body ul li { font-size: 0.9rem; color: #444; line-height: 1.8; }
    .accordion-body .note {
      background: #fff8e1; border-left: 3px solid #f0c040;
      padding: 0.7rem 1rem; border-radius: 0 6px 6px 0; margin: 0.8rem 0;
      font-size: 0.88rem; color: #6b5a00;
    }

    /* 联系卡片 */
    .cta-card {
      background: #fff; border: 1px solid #dde4ef; border-radius: 10px;
      padding: 1.5rem 1.8rem; margin-top: 2rem; text-align: center;
    }
    .cta-card h3 { font-size: 1.1rem; color: #1b3a6b; margin-bottom: 0.5rem; }
    .cta-card p { font-size: 0.9rem; color: #555; line-height: 1.8; }
    .cta-card .email { color: #2563a8; font-weight: 600; }

    footer { background: #1b3a6b; color: rgba(255,255,255,0.65); text-align: center; padding: 2rem 1rem; font-size: 0.85rem; line-height: 1.8; }
    footer strong { color: #fff; }

    @media (max-width: 768px) {
      nav { padding: 0 1.2rem; }
      .page-hero { padding: 2.5rem 1.2rem 2rem; }
      .page-hero h1 { font-size: 1.5rem; }
      .content { margin: 1.5rem auto 2.5rem; padding: 0 1rem; }
    }
  </style>
</head>
<body>

      <div class="nav-logo-text">
        <span class="cn">通跃检测</span>

      <a href="index.html" class="nav-back" data-i18n="back">← 返回首页</a>

  <div class="content">

    <!-- 🔧 章节 5 -->

      <button class="accordion-header" onclick="this.closest('.accordion').classList.toggle('open')">

  <footer>

    <p style="margin-top:0.5rem" data-i18n="footer-rights">&copy; 2026 通跃检测. 保留所有权利.</p>
  </footer>

  <script>
    const I18N = {
      zh: {
        'back':       '← 返回首页',
        'hero-h1':    '<!-- 🔧 中文标题 -->',
        'hero-p':     '<!-- 🔧 中文副标题 -->',
        'intro-title':'认证简介',
        'intro-text': '<!-- 🔧 中文简介 -->',
        'sec1-title': '<!-- 🔧 中文章节1标题 -->',
        'sec1-text':  '<!-- 🔧 中文章节1内容 -->',
        'sec2-title': '<!-- 🔧 中文章节2标题 -->',
        'sec2-text':  '<!-- 🔧 中文章节2内容 -->',
        'sec3-title': '<!-- 🔧 中文章节3标题 -->',
        'sec3-text':  '<!-- 🔧 中文章节3内容 -->',
        'sec4-title': '<!-- 🔧 中文章节4标题 -->',
        'sec4-text':  '<!-- 🔧 中文章节4内容 -->',
        'sec5-title': '<!-- 🔧 中文章节5标题 -->',
        'sec5-text':  '<!-- 🔧 中文章节5内容 -->',
        'cta-title':  '需要认证咨询？',
        'cta-text':   '欢迎联系我们：<br>👤 Mindy：mindy.liu@nbth-ha.com',
        'footer-rights': '&copy; 2026 通跃检测. 保留所有权利.',
      },
      en: {
        'back':       '← Back to Home',
        'hero-h1':    '<!-- 🔧 English title -->',
        'hero-p':     '<!-- 🔧 English subtitle -->',
        'intro-title':'Overview',
        'intro-text': '<!-- 🔧 English intro -->',
        'sec1-title': '<!-- 🔧 English section 1 title -->',
        'sec1-text':  '<!-- 🔧 English section 1 text -->',
        'sec2-title': '<!-- 🔧 English section 2 title -->',
        'sec2-text':  '<!-- 🔧 English section 2 text -->',
        'sec3-title': '<!-- 🔧 English section 3 title -->',
        'sec3-text':  '<!-- 🔧 English section 3 text -->',
        'sec4-title': '<!-- 🔧 English section 4 title -->',
        'sec4-text':  '<!-- 🔧 English section 4 text -->',
        'sec5-title': '<!-- 🔧 English section 5 title -->',
        'sec5-text':  '<!-- 🔧 English section 5 text -->',
        'cta-title':  'Need Certification Help?',
        'cta-text':   'Contact us:<br>👤 Mindy: mindy.liu@nbth-ha.com',
        'footer-rights': '&copy; 2026 Tongyue Testing. All Rights Reserved.',
      }
    };

    function setLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (I18N[lang] && I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
      localStorage.setItem('lang', lang);
    }

    (function() {
      const saved = localStorage.getItem('lang') || 'zh';
      if (saved === 'en') setLang('en');
    })();
  </script>
